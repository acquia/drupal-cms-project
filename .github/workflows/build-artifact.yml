name: Build and Deploy Artifact
on:
  push:
    branches:
      - main
  schedule:
    # This workflow runs every 8 hours to build and push the code artifact
    # with the latest dependencies.
    - cron: 0 */8 * * *
  workflow_dispatch:

env:
  # This is required to show colored output in the logs,
  # which is used in our build scripts.
  # @see scripts/_includes.sh
  TERM: xterm-256color

concurrency:
  group: build-artifact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifact:
    name: Build Drupal Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Set up MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e 'CREATE DATABASE drupal;' -uroot -proot
          mysql -e 'SHOW DATABASES;' -uroot -proot
          mysql -e 'CREATE USER "drupal"@"localhost" IDENTIFIED BY "drupal";' -uroot -proot
          mysql -e 'GRANT ALL PRIVILEGES ON *.* TO "drupal"@"localhost" WITH GRANT OPTION;' -uroot -proot
          mysql -e 'FLUSH PRIVILEGES;' -uroot -proot
          mysql -e 'SHOW GRANTS FOR "drupal"@"localhost";' -uroot -proot

      - name: Building Artifact
        run: ./scripts/build-artifact.sh

      - name: Commit Artifact
        run: |
          source ./scripts/_includes.sh
          cd ${ARTIFACT_DIR}
          # Initialize git in artifact directory
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build artifact from ${{ github.sha }}"
      - name: Validating Artifact
        run: ./scripts/install-site.sh

      - name: Deploy to dist branch
        run: |
          source ./scripts/_includes.sh
          cd ${ARTIFACT_DIR}
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:dist
          echo "✅ Artifact successfully deployed to dist branch"
          echo "📦 Source commit: ${{ github.sha }}"
