$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Tabs
group: Navigation
status: stable
description: "Unlimited tab tags. Two variants: default (no container background, Figma 1-11183/1-10890) and colored-background (gray container, Figma 1-8895/1-8492)."
props:
  type: object
  required:
    - variant
  properties:
    variant:
      type: string
      title: Variant
      enum:
        - default
        - colored-background
      default: "default"
      meta:enum:
        default: "Default (no background)"
        colored-background: "Colored background"
      examples:
        - default
    tab_labels:
      type: string
      title: Tab labels
      description: "Comma-separated list. Any number of tags (e.g. 'View all,Monthly,Yearly,Quarterly'). Must match tab_id on cards for filtering."
      default: "View all,Monthly,Yearly"
    active_index:
      type: integer
      title: Active tab index (0-based)
      default: 0
    tab_id_prefix:
      type: string
      title: ID prefix for aria-controls
      default: "tab"
    aria_label:
      type: string
      title: Accessible region label
      default: ""
