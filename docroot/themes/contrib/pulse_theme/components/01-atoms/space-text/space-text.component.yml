$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

name: Space Text

group: Atoms

props:

  type: object

  required:
    - text
    - text_size
  
  properties:
    title:
      type: string
      title: Title
      description: "Enter the title content."

    heading_level:
      type: string
      title: Heading level
      description: "Select the heading level for the title content."
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: H1
        h2: H2
        h3: H3
        h4: H4
        h5: H5
        h6: H6

    text:
      type: string
      title: Rich text
      contentMediaType: text/html
      x-formatting-context: block
      description: "Use this component when you need to display rich text content."
      examples:
        - <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Tristique pretium pellentesque semper enim aliquam.</p>

    text_size:
      type: string
      title: Text size
      description: "Select the text size for the rich text content."
      enum:
        - text-xs
        - text-sm
        - normal
        - text-lg
        - text-xl
        - text-2xl
        - text-3xl
      meta:enum:
        text-xs: 12px
        text-sm: 14px
        normal: 16px (default)
        text-lg: 18px
        text-xl: 20px
        text-2xl: 24px
        text-3xl: 32px
      examples:
        - normal
