'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'

name: Space Accordion

description: This component allows for the display of collapsible content sections, ideal for presenting frequently asked questions, detailed information, or nested content in a compact manner. It helps in organizing large amounts of text by showing only a summary initially, expanding upon user interaction. Use this component to improve content scannability and reduce visual clutter on a page.

status: stable

group: Organisms

props:

  type: object

  properties:

    icon_type:
      type: string
      title: Icon
      description: Icon
      enum:
        - PlusMinus
        - chevronDown
        - noIcon
      default: PlusMinus
      examples:
        - 'PlusMinus'

    alignment:
      type: string
      title: Icon alignment
      description: Icon alignment
      enum:
        - right
        - left
      default: right
      examples:
        - 'right'

    border:
      type: boolean
      title: Border Style
      description: Border Style
      default: true
      examples:
        - true

    container_width:
      type: string
      title: Container width
      description: Container width
      enum:
        - default
        - half-width
        - three-quarters-width
      default: default
      examples:
        - 'default'

slots:

  items:
    title: Accordion Items
    description: Add one or more **Accordion Item** components into this slot; each item will render as a collapsible panel inside the accordion.

