'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json'

name: Space Hero Banner with Media

description: This component renders a prominent hero banner with media, designed for the top of a page to create a strong initial impact. It integrates a image with a main title, label and category, effectively communicating a key message to the user.

status: stable

group: Organisms

props:

  type: object

  required:
    - title

  properties:
    image:
      title: Image
      $ref: json-schema-definitions://canvas.module/image
      type: object
      examples:
        - src: 'images/city.jpg'
          alt: 'Boring placeholder'
          width: 420
          height: 322

    label:
      type: string
      title: Label
      description: The label of the section.
      examples:
        - "Research Paper"

    title:
      type: string
      title: Title
      description: Title of the banner.
      examples:
        - "Understanding Common Medicines: What They Do and How to Use Them Safely"

    institute_involved:
      type: string
      title: Institute Involved
      description: The institute involved in the paper.
      examples:
        - "Global Institute of Metabolic Health"

    primary_category:
      type: string
      title: Primary Category
      description: Primary category of the card.
      examples:
        - "Everyday health"

    secondary_category:
      type: string
      title: Secondary Category
      description: Secondary category of the card.
      examples:
        - "Care Decisions"

    download_paper_link:
      type: string
      title: Download Paper Link
      description: Link to Download Paper
      examples:
        - "download"

    modifier_class:
      type: string
      title: Modifier class
      description: Additional classes.
      examples:
        - "custom-class"

thirdPartySettings:
  sdcStorybook:
    stories:
      preview: {}
