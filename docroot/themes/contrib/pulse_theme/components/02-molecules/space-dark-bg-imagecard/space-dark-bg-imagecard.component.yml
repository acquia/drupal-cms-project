"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"

name: Space Dark bg Image Card

status: stable

group: Molecules

props:
  type: object

  properties:
    title:
      type: string
      title: Title
      description: Title
      examples:
        - "Explore Nutrition"

    url:
      type: string
      title: Link URL
      description: URL where the card should link.
      examples:
        - "/event/building-sustainable-workout"
    
    image:
      title: "Image"
      $ref: json-schema-definitions://canvas.module/image
      type: object
      examples:
        - src: "images/city.jpg"
          alt: "Boring placeholder"
          width: 336
          height: 392

    text:
      type: string
      title: Description
      contentMediaType: text/html
      x-formatting-context: block
      description: Description text under the headline.
      examples:
        - "Explore the world of balanced eating, mindful choices, and science-backed advice—no fads, just facts."

    alignment:
      type: string
      title: Alignment
      description: Alignment
      enum:
        - vertical
        - horizontal
      default: vertical
      examples:
        - vertical

    horizontal_column_alignment:
      type: string
      title: Horizontal column alignment
      description: Horizontal column alignment
      enum:
        - left-image
        - right-image
      default: left-image
      examples:
        - left-image

    vertical_column_alignment:
      type: string
      title: Vertical column alignment
      description: Vertical column alignment
      enum:
        - top-image
        - bottom-image
      default: top-image
      examples:
        - top-image

    card_layout:
      type: string
      title: Layout of card
      description: Layout of card
      enum:
        - default
        - no-image
      default: default
      examples:
        - default

    card_size:
      type: string
      title: Card size
      description: Card size
      enum:
        - large
        - medium
        - small
      default: large
      examples:
        - large

    full_box_link:
      type: boolean
      title: Full box link
      description: Full box link
      default: false
      examples:
        - false

    extra_classes:
      type: string
      title: Class names (multiple class names separated by space). Only applied when custom style enabled.
      description: Class names (multiple class names separated by space). Only applied when custom style enabled.

thirdPartySettings:
  sdcStorybook:
    stories:
      preview: {}
