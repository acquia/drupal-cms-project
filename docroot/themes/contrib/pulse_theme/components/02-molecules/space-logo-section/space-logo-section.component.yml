$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json

name: Space Logo Section

status: stable

group: Molecules

props:

  type: object

  properties:
    pre_heading:
      type: string
      title: Pre Heading
      description: Pre heading content.
      examples: 
        - 'Launch faster'

    heading:
      type: string
      title: Heading
      description: The heading of the section.
      examples:
        - 'Curabitur suscipit suscipit tellus'

    tag_name:
      type: string
      title: Tag
      description: The HTML tag to be used for the heading (e.g., h1, h2).
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      meta:enum:
        h1: H1
        h2: H2
        h3: H3
        h4: H4
        h5: H5
        h6: H6
      default: h2
      examples:
       - 'h2'

    description:
      type: string
      title: Description
      contentMediaType: text/html
      x-formatting-context: block
      description: "Use this component when you need to display rich text content."
      examples:
        - <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Tristique pretium pellentesque semper enim aliquam.</p>

slots:

  content:
    title: Content
    description: Content to be displayed in the section.
