$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Testimonial Module
group: Organisms
status: stable
description: A slider module for grouping multiple Testimonial Items.
props:
