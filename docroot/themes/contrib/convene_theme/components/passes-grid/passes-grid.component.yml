$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Passes Grid
group: Organisms
status: stable
description: A 3-column grid component for displaying Ticket Passes on a dark blue background.
props:
  type: object
  properties:
    admin_theme:
      title: Admin Theme
      type: boolean
      default: false
      description: Check to enable Admin Theme styles (applies CSS only on frontend to preserve Canvas builder look).
    eyebrow:
      title: Eyebrow
      type: string
    title:
      title: Title
      type: string
    description:
      title: Description
      type: string
slots:
  items:
    title: Items Slot
    description: Slot for individual pass card components.
library:
  css:
    component:
      passes-grid.css: {}
