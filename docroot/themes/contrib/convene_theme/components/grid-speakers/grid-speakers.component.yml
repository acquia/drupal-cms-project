$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Speakers Grid
group: Organisms
status: stable
description: A grid layout component for displaying Speaker Cards.
props:
  type: object
  properties:
    admin_theme:
      title: Admin Theme
      type: boolean
      default: false
      description: Check to enable Admin Theme styles (applies CSS only on frontend to preserve Canvas builder look).
slots:
  heading:
    title: Heading Slot
    description: Row heading.
  description:
    title: Description Slot
    description: Optional subtext below or beside the heading.
  items:
    title: Items Slot
    description: Slot for individual speaker card components.
library:
  css:
    component:
      grid-speakers.css: {}
