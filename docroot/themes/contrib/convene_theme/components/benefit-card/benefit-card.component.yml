$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Benefit Card
group: Molecules
status: stable
description: An individual benefit/logistics card component with a light grey background and text props.
props:
  type: object
  properties:
    admin_theme:
      title: Admin Theme
      type: boolean
      default: false
      description: Check to enable Admin Theme styles (applies CSS only on frontend to preserve Canvas builder look).
    title:
      title: Title
      type: string
    description:
      title: Description
      type: string
slots:
  icon:
    title: Icon Slot
    description: Slot for the SVG/image icon.
  action:
    title: Action Slot
    description: Slot for the action button or link text.
library:
  css:
    component:
      benefit-card.css: {}
