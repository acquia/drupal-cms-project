slots:
  slot_1:
    title: Column 1
    description: Content for the first column (always visible).
  slot_2:
    title: Column 2
    description: Content for the second column (visible when columns >= 2).
  slot_3:
    title: Column 3
    description: Content for the third column (visible when columns >= 3).
  slot_4:
    title: Column 4
    description: Content for the fourth column (visible when columns = 4).
library:
  css:
    component:
      sdc_grid.css: {}
