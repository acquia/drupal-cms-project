# Breakpoints - based on eureka/components/00-base/base/_02.breakpoints.scss
eureka.xs:
  label: phone
  mediaQuery: 'all and (max-width: 380px)'
eureka.sm:
  label: phablet
  mediaQuery: 'all and (min-width: 381px)'
eureka.sm_md:
  label: tablet-small
  mediaQuery: 'all and (min-width: 540px)'
eureka.md:
  label: tablet
  mediaQuery: 'all and (min-width: 768px)'
eureka.md_lg:
  label: tablet-wide
  mediaQuery: 'all and (min-width: 1024px)'
eureka.lg:
  label: desktop
  mediaQuery: 'all and (min-width: 1280px)'
eureka.xl:
  label: desktop-wide
  mediaQuery: 'all and (min-width: 1440px)'
eureka.xxl:
  label: desktop-extrawide
  mediaQuery: 'all and (min-width: 1920px)'
