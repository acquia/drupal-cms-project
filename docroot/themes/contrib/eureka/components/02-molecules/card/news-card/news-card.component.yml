$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: News Card
status: stable
description: News Card component
# Overrides regular css with minified.
libraryOverrides:
  css:
    component:
      news-card.min.css: { minified: true }
group: Eureka component items
props:
  type: object
  properties:
    news_card_image:
      $ref: json-schema-definitions://canvas.module/image
      title: Card image
      description: Image and alt text for the card.
      type: object
      examples:
        - src: 'assets/277628-911758.jpg'
          alt: 'Photo by gdtography: https://www.pexels.com/photo/long-exposure-photography-white-dome-building-interior-911758/'
    news_card_heading:
      type: string
      title: Card heading
      description: Title of the card
      examples:
        - Lorem ipsum
    news_card_text:
      type: ['string', 'null']
      title: Card text
      description: Body of the card, usually HTML markup created in a WYSIWYG
      examples:
        - Lorem ipsum dolor sit amet, consectetur adipiscing elit.
    news_card_date:
      type: ['string', 'null']
      title: Card date
      description: Card date in 'j M Y' format
      examples:
        - 8 Oct 2025
    news_card_link_url:
      type: string
      format: uri-reference
      title: Vacancy CTA URL
      description: Link to the vacancy
      x-allowed-schemes:
        - http
        - https
      examples:
        - 'https://zoocha.com'
