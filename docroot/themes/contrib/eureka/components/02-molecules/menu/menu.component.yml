$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: Menu
status: stable
description: Menu component
# Overrides regular css with minified.
libraryOverrides:
  css:
    component:
      menu.min.css: { minified: true }
group: Eureka main components
props:
  type: object
  properties:
    menu_type:
      type: ['string', 'null']
      title: Menu type
      description: Items are displayed vertically by default. Use the inline modifier to get them in the same row
      enum:
        - default
        - inline
      examples:
        - default
