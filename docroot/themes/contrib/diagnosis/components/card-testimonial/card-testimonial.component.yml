"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Testimonial card
group: Card
props:
  type: object
  required:
    - align
    - style
  properties:
    text:
      type: string
      title: Quote text
      pattern: "(.|\\r?\\n)*"
      examples:
        - "The level of care and attention I received was exceptional. From my first appointment to follow-up visits, every member of the team made me feel heard and supported."
    cite_name:
      type: string
      title: Citation name
      examples:
        - "Sarah Mitchell"
    cite_text:
      type: string
      title: Citation text
      examples:
        - "Patient since 2023"
    cite_url:
      type: string
      title: Citation link
    align:
      type: string
      title: Alignment
      enum:
        - center
        - left
      default: center
      examples:
        - center
    style:
      type: string
      title: Style
      enum:
        - default
        - inverted
      meta:enum:
        default: Default
        inverted: Inverted
      default: default
      examples:
        - default
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: "assets/portrait.png"
          alt: "Placeholder"
          width: 100
          height: 100
