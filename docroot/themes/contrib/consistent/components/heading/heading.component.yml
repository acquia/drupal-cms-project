"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Heading
group: Base
status: stable
props:
  type: object
  required:
    - heading_text
    - heading_level
  properties:
    heading_text:
      type: string
      title: Heading
      default: "Enter title"
      examples:
        - "Your heading goes here"
    heading_level:
      type: number
      title: Heading level
      enum: [1, 2, 3, 4, 5, 6]
      examples:
        - 2
    heading_url:
      type: string
      title: Link
