  field_mc_content:
    -
      value: '<h2>Who we are</h2><p>We are the government’s lead agency for protecting and improving the health and wellbeing of our community, now and for future generations. We work across health, disability and aged care systems to support safe, high‑quality and accessible services for everyone.</p><h2>Our purpose</h2><p>Our purpose is to shape a healthier future through evidence‑based policy, targeted programs and effective regulation of the health system. We focus on prevention, early intervention and equitable access to care, so people can live longer, healthier and more independent lives.</p><h2>What we do</h2><p>We develop national health policies and standards, manage funding and grants, and regulate services to keep people safe. We also provide trusted health information, lead responses to public health emergencies, and partner with researchers to inform better care.</p><h2>How we work with others</h2><p>We collaborate with consumers, clinicians, First Nations communities, service providers and other governments to design and deliver health solutions that meet local needs. Through open consultation and partnerships, we listen, learn and act to continuously improve the health system for all.</p>'
      format: content_format
