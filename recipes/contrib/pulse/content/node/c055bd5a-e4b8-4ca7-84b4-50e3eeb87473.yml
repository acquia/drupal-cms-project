  field_content_description:
    -
      value: '<p>Integrating physical activity into daily routines Integrating physical activity into daily routinesIntegrating physical activity into daily routinesIntegrating physical activity into daily routines.</p><p>Medicines play a key role in managing symptoms, treating conditions, and supporting long-term health. While many medicines are commonly prescribed or available over the counter, understanding how they work and how to use them correctly is essential for safe and effective care.<br>This article provides a general overview of commonly used medicines, their purpose, and important considerations to keep in mind before taking them.</p><drupal-media data-entity-type="media" data-entity-uuid="3c7deaec-fcfa-4a3d-9b15-9b6894c64876">&nbsp;</drupal-media><p>&nbsp;</p><h4>What Are Medicines Used For?</h4><p>Medicines are designed to help the body heal, manage discomfort, or control chronic conditions. Depending on the type, they may:</p><ul><li data-list-item-id="e1b948bee711dd31f8c3c4f90f35405ef">Relieve symptoms such as pain, fever, or inflammation</li><li data-list-item-id="e822ae5d7c47031e52f309e8c21cf4c13">Treat infections by targeting bacteria or viruses</li><li data-list-item-id="ed7128942a30797e8cfd8948a2771dd89">Manage long-term conditions like diabetes, asthma, or high blood pressure</li><li data-list-item-id="eaf52ac91013cd59898360ab79c4559a9">Support recovery after illness or surgery</li><li data-list-item-id="ea7ef74bcde73583117bb435857f73033">Some medicines act quickly, while others need to be taken regularly over time to be effective.</li></ul><h4><br>What Are Medicines Used For?</h4><ol><li data-list-item-id="eb8574acb6679143b264ea467d6e53fbb"><h5>Pain Relievers</h5><p>Medicines are designed to help the body heal, manage discomfort, or control chronic conditions. Depending on the type, they may:</p><ul><li data-list-item-id="e8acf2847dd74fd3d9f4e16fbc9a4d9a6">Relieve symptoms such as pain, fever, or inflammation</li><li data-list-item-id="e8adb84aadd4c2ba58687fbfb5fa599ea">Treat infections by targeting bacteria or viruses</li><li data-list-item-id="ec0b872ea9753d36bee8edfe0868f147c">Manage long-term conditions like diabetes, asthma, or high blood pressure</li><li data-list-item-id="e3cea9c782f46006cb43388a37a3739a9">Support recovery after illness or surgery</li><li data-list-item-id="edbb928bee22a1556e40ad91f7a225905">Some medicines act quickly, while others need to be taken regularly over time to be effective.</li></ul><p><br>&nbsp;</p></li><li data-list-item-id="e231aba78e0e0fb375d147add552fcd44"><h5>Antibiotics</h5><p>Used to treat bacterial infections. These should only be taken when prescribed and completed as directed.<br>&nbsp;</p></li><li data-list-item-id="eca83a00c765bf11068839cd0612df113"><h5>Preventive Medicine</h5><p>Help reduce the risk of future illness or complications, often used in long-term care.<br>&nbsp;</p></li></ol><h4>When to Consult a Doctor</h4><p>When to Consult a Doctor</p>'
      format: content_format
