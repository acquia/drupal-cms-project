      value: '<p>Nutrition is one of the most important foundations of overall health. The food we consume directly affects energy levels, immune function, and long-term disease risk.</p><p>In this video, we explore how balanced nutrition supports physical and mental well-being.</p><p>Key topics include:</p><ul><li data-list-item-id="e7af72d378cc8bda5437bd07b2b2f5415">Understanding essential nutrients</li><li data-list-item-id="ef5263c2178b6a2d79cb1f7a92be73548">Building balanced meals for daily health</li><li data-list-item-id="e73014b790131336bd1739707641eddbe">The relationship between diet and chronic disease prevention</li><li data-list-item-id="ebe27cdba0a7f7714df9e08a2611717b9">Practical strategies for improving eating habits</li></ul><p>Through expert insights and real-life examples, this video helps viewers understand how thoughtful food choices can support a healthier lifestyle.</p>'
