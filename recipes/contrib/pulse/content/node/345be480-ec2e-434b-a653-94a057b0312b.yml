      value: '<p>Stress is a common part of modern life, but long-term stress can affect both mental and physical well-being.</p><p>In this video, we examine how stress influences health and explore practical techniques for managing it effectively.</p><p>Topics discussed include:</p><ul><li data-list-item-id="e9601067ac47536b5c218a0890a86d899">How stress affects the body and mind</li><li data-list-item-id="ef2704652ebf1d8bcfbcbd6b92db7b276">Early signs of chronic stress</li><li data-list-item-id="e84b6a39cce1caff350d6c82854fc23df">Mindfulness and relaxation techniques</li><li data-list-item-id="e6e0547616161aabf3872820267955448">Lifestyle habits that improve emotional resilience</li></ul><p>By learning to manage stress effectively, individuals can improve focus, sleep quality, and overall health.</p>'
