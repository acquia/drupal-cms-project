  field_body:
    -
      value: "<div class=\"widget\">\r\n\r\n    <div class=\"widget-head\">\r\n      <h3>See Provus®EDU in action</h3>\r\n      <a href=\"https://prometsource.com/provus/provus-edu\" target=\"_blank\" title=\"Help center\">Help center ↗</a>\r\n    </div>\r\n\r\n    <div class=\"widget-body\">\r\n\r\n      <p class=\"lead\">\r\n        Get a 30-minute walkthrough with a higher-ed specialist. We'll show you the features that fit your campus.\r\n      </p>\r\n\r\n      <!-- HubSpot will inject the form inside this target -->\r\n      <div id=\"hubspot-form-target\"></div>\r\n\r\n      <p class=\"foot\">\r\n        Already a customer and need help? <a href=\"https://prometsource.com/provus/provus-edu\">Contact support →</a>\r\n      </p>\r\n\r\n    </div>\r\n  </div>\r\n\r\n<!-- HubSpot embed -->\r\n<script charset=\"utf-8\" type=\"text/javascript\" src=\"https://js.hsforms.net/forms/embed/v2.js\"></script>\r\n<script>\r\n  hbspt.forms.create({\r\n    portalId: \"22569384\",\r\n    formId: \"c0a405df-569b-47be-9606-d549a84c6634\",\r\n    region: \"na1\",\r\n    target: \"#hubspot-form-target\"\r\n  });\r\n</script>\r\n\r\n<style>\r\n  .stage { width: 100%; max-width: 380px; }\r\n\r\n  .stage-label {\r\n    font-size: 11px;\r\n    font-weight: 600;\r\n    letter-spacing: 0.06em;\r\n    text-transform: uppercase;\r\n    color: var(--muted);\r\n    margin: 0 0 10px 2px;\r\n  }\r\n\r\n  /* ---------- widget chrome ---------- */\r\n  .widget {\r\n    background: var(--bg);\r\n    border: 1px solid var(--line);\r\n    border-radius: var(--radius);\r\n    overflow: hidden;\r\n  }\r\n\r\n  .widget-head {\r\n    padding: 12px 16px;\r\n    background: #F8FAFC;\r\n    border-bottom: 1px solid var(--line);\r\n    display: flex;\r\n    align-items: center;\r\n    justify-content: space-between;\r\n  }\r\n  .widget-head h3 {\r\n    margin: 0;\r\n    font-size: 14px;\r\n    font-weight: 600;\r\n    color: var(--brand);\r\n  }\r\n  .widget-head a {\r\n    font-size: 12px;\r\n    color: var(--muted);\r\n    text-decoration: none;\r\n  }\r\n  .widget-head a:hover { color: var(--brand); }\r\n\r\n  .widget-body { padding: 16px; }\r\n\r\n  .lead {\r\n    font-size: 13px;\r\n    color: var(--ink-soft);\r\n    line-height: 1.5;\r\n    margin: 0 0 14px;\r\n  }\r\n\r\n  .foot {\r\n    margin-top: 12px;\r\n    padding-top: 12px;\r\n    border-top: 1px solid var(--line-2);\r\n    font-size: 11.5px;\r\n    color: var(--muted);\r\n    line-height: 1.5;\r\n  }\r\n  .foot a {\r\n    color: var(--brand);\r\n    text-decoration: none;\r\n    font-weight: 500;\r\n  }\r\n  .foot a:hover { text-decoration: underline; }\r\n\r\n  /* ====================================================== */\r\n  /*   HUBSPOT FORM STYLING OVERRIDES                       */\r\n  /*   These target the classes HubSpot's embed.js outputs  */\r\n  /* ====================================================== */\r\n\r\n  .hbspt-form {\r\n    font-family: inherit !important;\r\n  }\r\n\r\n  /* form container */\r\n  .hs-form {\r\n    display: flex;\r\n    flex-direction: column;\r\n    gap: 10px;\r\n  }\r\n\r\n  /* each field */\r\n  .hs-form-field {\r\n    display: flex;\r\n    flex-direction: column;\r\n    gap: 4px;\r\n    margin: 0 !important;\r\n  }\r\n\r\n  /* labels */\r\n  .hs-form-field > label,\r\n  .hs-form-field > label > span {\r\n    font-size: 12px !important;\r\n    font-weight: 500 !important;\r\n    color: var(--ink-soft) !important;\r\n    line-height: 1.4 !important;\r\n  }\r\n  .hs-form-required {\r\n    color: var(--accent) !important;\r\n    margin-left: 2px;\r\n  }\r\n\r\n  /* field-level help text */\r\n  .hs-field-desc,\r\n  legend.hs-field-desc {\r\n    font-size: 11px !important;\r\n    color: var(--muted) !important;\r\n    margin: 2px 0 0 !important;\r\n    font-weight: 400 !important;\r\n  }\r\n\r\n  /* inputs / selects / textareas */\r\n  .hs-input {\r\n    width: 100% !important;\r\n    padding: 7px 10px !important;\r\n    font-family: inherit !important;\r\n    font-size: 13px !important;\r\n    color: var(--ink) !important;\r\n    background: #fff !important;\r\n    border: 1px solid #D1D5DB !important;\r\n    border-radius: 4px !important;\r\n    outline: none !important;\r\n    transition: border-color .12s, box-shadow .12s !important;\r\n    box-shadow: none !important;\r\n    line-height: 1.4 !important;\r\n    height: auto !important;\r\n  }\r\n  .hs-input:focus {\r\n    border-color: var(--brand) !important;\r\n    box-shadow: 0 0 0 3px rgba(11,61,145,.12) !important;\r\n  }\r\n  textarea.hs-input { min-height: 70px; resize: vertical; }\r\n\r\n  /* selects: native arrow via background-image */\r\n  select.hs-input {\r\n    appearance: none;\r\n    -webkit-appearance: none;\r\n    background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%236B7280' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>\") !important;\r\n    background-repeat: no-repeat !important;\r\n    background-position: right 10px center !important;\r\n    padding-right: 28px !important;\r\n  }\r\n\r\n  /* checkboxes / radios */\r\n  .hs-form-booleancheckbox-display,\r\n  .hs-form-checkbox-display,\r\n  .hs-form-radio-display {\r\n    display: flex !important;\r\n    align-items: flex-start !important;\r\n    gap: 8px !important;\r\n    font-size: 12.5px !important;\r\n    color: var(--ink-soft) !important;\r\n    line-height: 1.45 !important;\r\n    padding: 2px 0 !important;\r\n  }\r\n  .hs-form-booleancheckbox-display > input,\r\n  .hs-form-checkbox-display > input,\r\n  .hs-form-radio-display > input {\r\n    margin-top: 2px;\r\n  }\r\n  .hs-form-booleancheckbox-display > span,\r\n  .hs-form-checkbox-display > span,\r\n  .hs-form-radio-display > span {\r\n    font-size: 12.5px !important;\r\n    color: var(--ink-soft) !important;\r\n  }\r\n\r\n  /* error states */\r\n  .hs-input.invalid.error,\r\n  .hs-input.invalid {\r\n    border-color: var(--danger) !important;\r\n    box-shadow: 0 0 0 3px rgba(178,58,43,.10) !important;\r\n  }\r\n  .hs-error-msgs,\r\n  ul.hs-error-msgs {\r\n    list-style: none !important;\r\n    padding: 0 !important;\r\n    margin: 2px 0 0 !important;\r\n  }\r\n  .hs-error-msg,\r\n  .hs-error-msgs label {\r\n    font-size: 11.5px !important;\r\n    color: var(--danger) !important;\r\n    font-weight: 400 !important;\r\n  }\r\n  /* hide HubSpot's default \"Please complete this required field.\" until user submits — optional behavior is theme-default, but we keep error styling clean */\r\n\r\n  /* legal text / GDPR consent */\r\n  .legal-consent-container,\r\n  .hs-richtext {\r\n    font-size: 11px !important;\r\n    color: var(--muted) !important;\r\n    line-height: 1.5 !important;\r\n    margin: 4px 0 !important;\r\n  }\r\n  .legal-consent-container a,\r\n  .hs-richtext a {\r\n    color: var(--brand) !important;\r\n    text-decoration: none !important;\r\n  }\r\n  .legal-consent-container a:hover,\r\n  .hs-richtext a:hover { text-decoration: underline !important; }\r\n\r\n  /* submit button */\r\n  .hs-submit { margin-top: 4px; }\r\n  .hs-button,\r\n  input[type=\"submit\"].hs-button {\r\n    width: 100% !important;\r\n    background: var(--accent) !important;\r\n    color: #fff !important;\r\n    font-family: inherit !important;\r\n    font-weight: 600 !important;\r\n    font-size: 13px !important;\r\n    padding: 9px 14px !important;\r\n    border: none !important;\r\n    border-radius: 4px !important;\r\n    cursor: pointer !important;\r\n    transition: background .12s !important;\r\n    text-shadow: none !important;\r\n    box-shadow: none !important;\r\n    height: auto !important;\r\n    line-height: 1.4 !important;\r\n  }\r\n  .hs-button:hover,\r\n  input[type=\"submit\"].hs-button:hover { background: #D44F2D !important; }\r\n  .hs-button:active,\r\n  input[type=\"submit\"].hs-button:active { background: var(--accent-dk) !important; }\r\n\r\n  /* general form-wide error summary */\r\n  .hs_error_rollup,\r\n  .submitted-message ~ * { display: none; }\r\n\r\n  /* success message after submit */\r\n  .submitted-message {\r\n    padding: 14px 14px !important;\r\n    background: #ECFDF5 !important;\r\n    border: 1px solid #A7F3D0 !important;\r\n    border-radius: 4px !important;\r\n    color: #065F46 !important;\r\n    font-size: 13px !important;\r\n    line-height: 1.5 !important;\r\n  }\r\n\r\n  /* hide HubSpot's \"Marketing by\" attribution */\r\n  .hs_recaptcha + .legal-consent-container,\r\n  .hs-form .hs-form-required:empty { display: inherit; }\r\n\r\n  /* loading skeleton while HubSpot script attaches */\r\n  #hubspot-form-target:empty::before {\r\n    content: \"Loading form…\";\r\n    display: block;\r\n    padding: 12px;\r\n    background: var(--line-2);\r\n    border-radius: 4px;\r\n    color: var(--muted);\r\n    font-size: 12px;\r\n    text-align: center;\r\n  }\r\n</style>"
      format: advance_html
