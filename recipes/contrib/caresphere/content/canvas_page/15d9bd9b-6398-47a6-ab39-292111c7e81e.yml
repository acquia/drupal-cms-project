      component_id: sdc.caresphere_theme.accordion
      inputs:
        answer: "Yes. We have roles both in the field and online. Tell us what you prefer and we'll find a fit."
        question: 'Can I volunteer remotely?'
        default_state: collapsed
    -
      parent_uuid: 9555be1e-024b-48a4-a2c8-34a3434873b6
      slot: slot_1
      uuid: ecac147e-7c40-401d-96e9-67311de3fad4
      component_id: sdc.caresphere_theme.accordion
      inputs:
        answer: "Businesses and organizations partner with us in many ways. Reach out and let's talk about what's possible."
