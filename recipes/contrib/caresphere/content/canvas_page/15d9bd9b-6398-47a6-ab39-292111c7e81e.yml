      component_id: sdc.caresphere_theme.accordion
      inputs:
        answer: "We work with people's schedules. Some volunteer weekly, others help once a month. You decide what works for you."
        question: 'How much time do I need?'
        default_state: collapsed
    -
      parent_uuid: 9555be1e-024b-48a4-a2c8-34a3434873b6
      slot: slot_1
      uuid: a8efb468-e3bd-4cf4-a0ca-587289750191
      component_id: sdc.caresphere_theme.accordion
      inputs:
        answer: 'No. We train everyone. What matters is your willingness to show up and do the work.'
        question: 'Do I need experience?'
        default_state: collapsed
    -
      parent_uuid: 9555be1e-024b-48a4-a2c8-34a3434873b6
