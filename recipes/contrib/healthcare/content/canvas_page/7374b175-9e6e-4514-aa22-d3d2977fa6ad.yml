      slot: main_slot
      uuid: bd62bb22-728f-4278-9449-7ce54b0ba73b
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<ul><li data-list-item-id="ee946bb201a2f0e1272c49cb8e03db635">Valid photo ID (driver''s license, passport, or state ID)</li><li data-list-item-id="e8a26629daf03813ad33c2e55e84cf7e6">Insurance card(s)</li><li data-list-item-id="e24a4f1e75cfedfdd4f3dbb68971097b4">List of current medications (including dosages)</li><li data-list-item-id="e5026d7e366ddcca2005e74571f81868b">List of allergies</li><li data-list-item-id="e47284d8c1b59a057420a807738e3c1fa">Any recent test results or imaging from other providers</li><li data-list-item-id="e780dd29cfd3268c18ee3e72590d2fcd7">Payment for copays or deductibles</li></ul>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: ea63f06c-0c63-44a3-92f3-d963275a1fe4
      slot: main_slot
      uuid: 3efc1410-4f42-4552-a750-0fdc880456c1
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Arrival & Check-In'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: ea63f06c-0c63-44a3-92f3-d963275a1fe4
      slot: main_slot
      uuid: 5728929b-c206-4611-a0e8-8344a15b9239
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Please arrive 15 minutes before your scheduled appointment to complete registration and update your information. Check in at the front desk with your photo ID and insurance card.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: ea63f06c-0c63-44a3-92f3-d963275a1fe4
      slot: main_slot
      uuid: 0b7ba0e4-e6fe-42c6-9cc0-8762706d17ba
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: Parking
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: ea63f06c-0c63-44a3-92f3-d963275a1fe4
      slot: main_slot
      uuid: a071d826-727f-4b4c-bba8-381c20a3992b
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Free parking is available at all locations. ADA accessible parking spaces are located near main entrances.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: ea63f06c-0c63-44a3-92f3-d963275a1fe4
      slot: main_slot
      uuid: 77a886f3-f92e-4727-8f12-539ba45a6089
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Visitor Policy'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: ea63f06c-0c63-44a3-92f3-d963275a1fe4
      slot: main_slot
      uuid: 9fed507d-cc20-4fba-b5ef-a924bdb134ea
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>For your safety and privacy, we limit visitors to one support person per patient. Exceptions may be made for minors and patients requiring assistance.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: ea63f06c-0c63-44a3-92f3-d963275a1fe4
      slot: main_slot
      uuid: 80a41740-8e4e-4e4d-b70d-ea8dceed73b7
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: Accessibility
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: ea63f06c-0c63-44a3-92f3-d963275a1fe4
      slot: main_slot
      uuid: 60dca334-b915-44b7-a1e8-3f7d608f4632
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>All Saltmarsh Island Health facilities are fully ADA accessible with wheelchair access, elevators, accessible restrooms, and assistive listening devices available upon request.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
