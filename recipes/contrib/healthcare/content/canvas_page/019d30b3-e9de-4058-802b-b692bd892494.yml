      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>The MyChart patient portal gives you secure, online access to your personal health information from your desktop, laptop, tablet, or smartphone. With MyChart, you can manage your healthcare from the comfort of your home.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
