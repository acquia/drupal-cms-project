          value: '<ul><li data-list-item-id="e9baadc809d941a3f8375848bbfeb9816">View test results and medical records</li><li data-list-item-id="ec75211bca6ab16e6ad073c69a6a9f759">Schedule appointments</li><li data-list-item-id="ef83637e0efb883351ffbb4f4d80daa7f">Request prescription refills</li><li data-list-item-id="e38355e0447e377e43da58a9f50fff5ad">Send messages to your care team</li><li data-list-item-id="e5e035c812d4d188fa3cb9c2fad3cf032">Pay bills online</li><li data-list-item-id="e8d0f70f9082967e52272b7edcc6aabe2">Access after-visit summaries</li><li data-list-item-id="e5d56e8bcb3d87a6e679a98bfa895fe47">Update contact and insurance information</li></ul>'
