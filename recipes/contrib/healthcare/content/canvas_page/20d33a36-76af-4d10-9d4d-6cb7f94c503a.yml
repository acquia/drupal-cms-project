      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Saltmarsh Island Health has been serving the residents of Saltmarsh Island and surrounding coastal communities for over 70 years. What began as a small community clinic has grown into a comprehensive healthcare system offering primary care, specialty services, and urgent care.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: 4842747b-6056-48e9-bff4-d044776378ff
