      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Our Values'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: 4842747b-6056-48e9-bff4-d044776378ff
      slot: main_slot
      uuid: 9c0f9694-8688-438b-8ee7-fe970eeac4d9
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<ul><li data-list-item-id="eb9b499b3e089d988bcdf5f60e93aafa0"><strong>Patient-Centered Care:</strong> Your health and well-being are at the center of everything we do.</li><li data-list-item-id="ec29da4a06f8fefd7ea78b8ba7e8a004c"><strong>Excellence:</strong> We are committed to the highest standards of medical care and continuous improvement.</li><li data-list-item-id="e4cbda31c0f525c0d7bcca194e8fd6589"><strong>Community:</strong> We are proud to serve and support the Saltmarsh Island community.</li><li data-list-item-id="e50ac0cb6150b20676eb4c90ad5e82145"><strong>Integrity:</strong> We operate with honesty, transparency, and ethical practices.</li><li data-list-item-id="e65550b5ddb312bc9862205eddf699c8b"><strong>Compassion:</strong> We treat every patient with kindness, empathy, and understanding.</li></ul>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: 4842747b-6056-48e9-bff4-d044776378ff
      slot: main_slot
      uuid: bd0c447d-439f-4ae8-b2f5-48d2fee2d341
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Accreditations & Awards'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: 4842747b-6056-48e9-bff4-d044776378ff
