      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Our Mission'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: 4842747b-6056-48e9-bff4-d044776378ff
      slot: main_slot
      uuid: d3566158-0c9d-42f1-b790-13262d220373
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>To provide accessible, high-quality healthcare to every member of our island community, treating each patient with dignity, compassion, and respect.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: 4842747b-6056-48e9-bff4-d044776378ff
      slot: main_slot
