      uuid: 657616f7-f1db-4d1b-a0be-ee3480b6efad
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Saltmarsh Island Health is accredited by The Joint Commission and has received the Lighthouse Award for Excellence in Patient Safety. Our commitment to quality has earned recognition from the American Heart Association and the National Committee for Quality Assurance.</p>'
          format: canvas_html_block
        text_size: normal
