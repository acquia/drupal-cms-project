      uuid: 378f75a6-06d9-4130-8f38-0e7ca0fd2fd4
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<ul><li data-list-item-id="e5cb7389f22eced1343d73aa9491e5a06">Blue Cross Blue Shield</li><li data-list-item-id="e38f3ee074202742265d5c0b8cb0e8f68">Medicare &amp; Medicare Advantage</li><li data-list-item-id="e3c5e07d7c325fabd28a41d38f8026776">MassHealth (Medicaid)</li><li data-list-item-id="edcb4a32aa0e6950401df376a3635ba4b">Aetna</li><li data-list-item-id="ef4de5a12be6fba00d7bdfe075b002e23">Cigna</li><li data-list-item-id="ec3ab8c815e11d1142a4594967fd12076">United Healthcare</li><li data-list-item-id="edeed6dbe35f03ef172baa8246b8485cc">Tufts Health Plan</li><li data-list-item-id="e1a91ebf9b90c6ccb52936574844e2a04">Harvard Pilgrim</li></ul><p>Please call (555) 123-4572 to verify your specific plan is accepted.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: 063a2b70-8dd2-4612-b2b6-c82f6a8ad823
