      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Phone: (555) 123-4569 (credit/debit card accepted)</p><p>Mail: Saltmarsh Island Health, PO Box 12345, Saltmarsh Island, MA 02554</p><p>In Person: Visit any of our locations during business hours</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
