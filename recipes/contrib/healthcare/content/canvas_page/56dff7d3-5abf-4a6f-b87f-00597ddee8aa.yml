      slot: main_slot
      uuid: 714c5a68-a21a-4e39-a2d8-45a854045c74
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>The fastest and easiest way to pay your bill is through your MyChart patient portal. Simply log in, view your account balance, and make a payment using your credit card, debit card, or checking account.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: 93980095-da55-4b0b-b3bf-b9712849e82e
      slot: main_slot
      uuid: ecfaa815-1867-4865-a1d0-54cfe7af5d88
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Pay Online Through MyChart'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: 93980095-da55-4b0b-b3bf-b9712849e82e
      slot: main_slot
      uuid: 9f42acb7-ab7d-43b3-88d7-b69bd688f20c
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Saltmarsh Island Health offers several convenient ways to pay your medical bills online. All payments are processed securely through our encrypted payment portal.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: 93980095-da55-4b0b-b3bf-b9712849e82e
      slot: main_slot
      uuid: aafc9890-6a44-40df-933d-bf09e33a6dc5
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'One-Time Payment (Without MyChart)'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: 93980095-da55-4b0b-b3bf-b9712849e82e
      slot: main_slot
      uuid: 6b346a9d-1242-431c-b903-124753b3d880
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: "<p>Don't have a MyChart account? You can still pay your bill online using our guest payment portal. You'll need your account number from your billing statement.</p>"
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: 93980095-da55-4b0b-b3bf-b9712849e82e
      slot: main_slot
      uuid: e394dc4d-b325-41de-94d7-df6c4e77f6f0
      component_id: sdc.diagnosis.heading
      inputs:
