      slot: main_slot
      uuid: 0afb7041-9735-4aa3-a407-abdb3325b892
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>If you need to set up a payment plan, please call our Billing Department at (555) 123-4569. We offer flexible payment arrangements to fit your budget.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
