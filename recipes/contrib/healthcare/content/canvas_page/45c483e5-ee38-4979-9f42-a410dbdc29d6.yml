      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>We are currently hiring for the following positions:</p><ul><li data-list-item-id="e7f6d238436642f8e432cc22acbf88ea2">Registered Nurses (Emergency Department)</li><li data-list-item-id="ef0481e818ab02361f9c25daa188f2dd5">Medical Assistants (Primary Care)</li><li data-list-item-id="ebefdbd584e7db1089d366de6aec9d0ca">Physical Therapist</li><li data-list-item-id="e8d82d626c68f06067d6129932d77c8c7">Radiologic Technologist</li><li data-list-item-id="e298b066622c59f7f193a8a9b8fc337be">Medical Billing Specialist</li><li data-list-item-id="e4f00d2c8faf3a9abc7871cda390b5d58">Patient Access Representative</li></ul>'
          format: canvas_html_block
        text_size: normal
        text_color: default
