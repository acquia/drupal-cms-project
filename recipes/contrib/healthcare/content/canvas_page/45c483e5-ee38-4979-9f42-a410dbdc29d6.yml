      uuid: 2d28e40c-e3a2-48ba-857a-9ac75039ab46
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Why Work at Saltmarsh Island Health?'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: ca21436c-ccd3-4c18-a2b6-bcb27ef8012a
      slot: main_slot
      uuid: e1cc9bdc-2080-459a-a326-800cb1e083b1
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<ul><li data-list-item-id="efa533b1b98a09437a5f5ad8ec4830f6a"><strong>Mission-Driven:</strong> Make a real difference in your community</li><li data-list-item-id="e86b9cfd4b0add4f55be57c8030c4ae71"><strong>Comprehensive Benefits:</strong> Health, dental, vision, retirement, and more</li><li data-list-item-id="ecee09c63dead96c4033d58bd2744c9d5"><strong>Work-Life Balance:</strong> Flexible scheduling and generous PTO</li><li data-list-item-id="e85c63692ad6fa88c1c648d1fd314eec7"><strong>Professional Development:</strong> Continuing education, tuition reimbursement, and career advancement</li><li data-list-item-id="eb5f0ffbcf05a8b73273a4506c64dffa2"><strong>Supportive Environment:</strong> Collaborative, team-oriented culture</li></ul>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: ca21436c-ccd3-4c18-a2b6-bcb27ef8012a
      slot: main_slot
