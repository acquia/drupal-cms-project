      uuid: 01b1a2ef-7f91-4ee2-8f1b-3f7794f678fd
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Saltmarsh Island Health is always looking for talented, compassionate healthcare professionals to join our team. We offer competitive salaries, excellent benefits, and opportunities for professional growth and development.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      parent_uuid: ca21436c-ccd3-4c18-a2b6-bcb27ef8012a
