      slot: hero_slot
      uuid: 3cb5615b-b433-4bfd-8e17-404ae5149a01
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>This website is built using the <a href="https://www.drupal.org/project/healthcare"><strong>Drupal Healthcare Site Template</strong></a> developed by <a href="https://kanopi.com/"><strong>Kanopi Studios</strong></a> and released under an open source license.</p><p>The template is freely available and designed to give healthcare organizations a strong, accessible, and scalable digital foundation.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      uuid: 6f926410-1e9d-403d-b48c-d61b782965e4
