        section_header: false
        section_footer: false
    -
      parent_uuid: 6f926410-1e9d-403d-b48c-d61b782965e4
      slot: main_slot
      uuid: 0d6638eb-0b36-4d15-a239-f27289dccaae
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Built for Healthcare Organizations'
        level: 2
        text_size: heading-responsive-4xl
        text_color: default
        align: left
    -
      parent_uuid: 6f926410-1e9d-403d-b48c-d61b782965e4
      slot: main_slot
      uuid: 389d66ac-9bf3-4ff4-a294-ef64a9442b79
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Modern healthcare websites must do more than look professional. They must build trust, support patients, meet accessibility standards, and adapt to evolving regulations and expectations.</p><p>Kanopi Studios partners with clinics, regional hospitals, healthcare systems, and mission-driven organizations to create digital experiences that:</p><ul><li data-list-item-id="edd7fe8b45f927b6b605e9ce850965a18">Build patient confidence and community trust</li><li data-list-item-id="e94c4add5e9ff6c24da1f26d0dc6dbe84">Support accessibility and compliance standards</li><li data-list-item-id="e35e9b440c1b85185cd907ee1437b4979">Improve findability of services and care providers</li><li data-list-item-id="ed5820603b0383e150fc51b6fdf6f4cbc">Scale with organizational growth</li><li data-list-item-id="e5762a1a7ba0b651caebe7a8350f7a9cd">Strengthen brand credibility</li></ul>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      uuid: 29f37327-a11b-4368-b85d-efe117a50fe2
