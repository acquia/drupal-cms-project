      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>This Healthcare Site Template was created by the Kanopi Studios team:</p><ul><li data-list-item-id="ec042048b13d97561e9c6d2c8e1fa1c49"><strong>Design:</strong> Nicole Karhoff</li><li data-list-item-id="ee51037cad22fad985f13c6fa218bb0b9"><strong>Technical Lead:</strong> Jim Birch</li><li data-list-item-id="e03b6762d3b3a1df7a28ef4bf8f78d463"><strong>Development:</strong> Anne Bonham, Kerry Murphy, &amp; Nicole Karhoff</li><li data-list-item-id="e2e6d9196bf327fa266c33131c8e6bf18"><strong>Project Management:</strong> Ben Merkley</li></ul>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
