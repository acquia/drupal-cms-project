      component_id: sdc.diagnosis.text
      inputs:
        text_size: normal
        text_color: default
        text:
          value: '<p>Select custom illustrations for this template were conceptualized and generated using ChatGPT 5.2.</p><p>Thanks to these great photographers for open sourcing their images on Unsplash.</p><ul><li data-list-item-id="e3281815a4013827e20838c6db7f0880b"><a href="https://unsplash.com/@accuray?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Accuray, [2]</a></li><li data-list-item-id="e43b2332001ad2ef845987416e67e706c"><a href="https://unsplash.com/@iam_aspencer?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Andrew Spencer</a></li><li data-list-item-id="e3020c7710361af0e9071a1d8a4b8a65b"><a href="https://unsplash.com/@theurso?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Brian Urso</a></li><li data-list-item-id="e4cdf9f3dd9564788fa99f1ebc554d47a"><a href="https://unsplash.com/@betoframe?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Humberto Chávez</a></li><li data-list-item-id="e55ab02680fe9cceac12004bcb1b583ce"><a href="https://unsplash.com/@hush52?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Hush Naidoo Jade Photography</a></li><li data-list-item-id="e0457b437cdeeee46118d0865329bb97e"><a href="https://unsplash.com/@jennifire24?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Jennifer Marcus</a></li><li data-list-item-id="e8da99694f14cc56fa549064ca38617ff"><a href="https://unsplash.com/@stillrehellek?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">John Kelleher</a></li><li data-list-item-id="e28c15dab4a8110e097d1a9ae14a8a3a6"><a href="https://unsplash.com/@jonathanborba?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Jonathan Borba</a></li><li data-list-item-id="e29e46991b56fd5d88d117d738f522e42"><a href="https://unsplash.com/@byjonathanng?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Jonathan Ng</a></li><li data-list-item-id="e4dcd3a9d129e080c28cc3ad9c3ff7b3e"><a href="https://unsplash.com/@attentivesoul?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Lisa Forkner</a></li><li data-list-item-id="e0e3444192519dfbf2b4d268934360462"><a href="https://unsplash.com/@lcma1028?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Luis Melendez</a></li><li data-list-item-id="e6c3c7d4a2d56d78d17779a5463a6fcab"><a href="https://unsplash.com/@jccards?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Marek Studzinski</a></li><li data-list-item-id="eaf973b24cd9833890162b21999ad0f72"><a href="https://unsplash.com/@nappystudio?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Nappy, [2], [3]</a></li><li data-list-item-id="e05d604a722efc8b12b3e35850c292b4d"><a href="https://unsplash.com/@nci?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">National Cancer Institute, [2], [3]</a></li><li data-list-item-id="e9f24d7da45e2f034451aa725461fdfee"><a href="https://unsplash.com/@ridhwanjohnson?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Oluwaseyi Johnson</a></li><li data-list-item-id="e87fb97e68e778dc4a5d551c510120ea6"><a href="https://unsplash.com/@tranazh?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Q A Trần</a></li><li data-list-item-id="eb72324b5a66648c9b8398c08c5d9c87e"><a href="https://unsplash.com/@ruthc333?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Ruth H Curtis</a></li><li data-list-item-id="ed8228f3cf062e17bd937a3ffb1d79323"><a href="https://unsplash.com/@rustyct1?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Rusty Watson</a></li><li data-list-item-id="ef942a5a2ef3e34b0278b079e5ab69b4d"><a href="https://unsplash.com/@sixteenmilesout?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Sixteen Miles Out</a></li><li data-list-item-id="eccfc0aec1817421b657fe95ffa1f5c8c"><a href="https://unsplash.com/@solenfeyissa?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Solen Feyissa</a></li><li data-list-item-id="e13c9edb1372f2c82375bdfc328099afb"><a href="https://unsplash.com/@sml4878?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Susan Lindberg</a></li><li data-list-item-id="e0e33bb435d1c955d4b9a36b960bd8f00"><a href="https://unsplash.com/@silverkblack?utm_source=unsplash&amp;utm_medium=referral&amp;utm_content=creditCopyText">Vitaly Gariev, [2]</a></li></ul>'
