    -
      parent_uuid: e6d9d82f-4799-48cd-9419-a45894ed1721
      slot: main_slot
      uuid: c9216ea2-0b06-4445-aea3-938c21dd7e56
      component_id: sdc.diagnosis.text
      inputs:
        text:
          value: '<p>Our Support program is unmatched.</p><p>Support for us is not just a service. Websites are living ecosystems. To stay healthy and effective, they need to evolve — adapting to shifting goals, changing user needs, and the ever-moving landscape of the web.</p><p>At Kanopi, continuous improvement goes deeper. We incorporate all our services into support. From design and strategy to navigation updates and microsites, we provide smart, high-impact enhancements that strengthen your digital foundation.</p><p>Because your mission deserves more than maintenance. It deserves momentum.</p><p><a href="https://kanopi.com/services/support/"><strong>Learn more about Kanopi''s long-term Support program at kanopi.com</strong></a></p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      uuid: d55dc3a0-5f39-40cd-a7a5-e47b4cdb587e
      component_id: sdc.diagnosis.cta
      inputs:
        heading_text: 'We build trust, not just websites.'
        level: 2
        text: 'If your organization is using this template and wants to tailor it to your brand, expand its capabilities, improve accessibility, or evolve your digital strategy, our team is ready to help.'
        text_align: center
        background_color: primary
    -
      parent_uuid: d55dc3a0-5f39-40cd-a7a5-e47b4cdb587e
