          value: '<p>How we protect your health information.</p>'
          format: canvas_html_block
        text_size: normal
        text_color: default
    -
      uuid: 775c06f8-762d-47d6-8566-b8d9ae8521e5
      component_id: sdc.diagnosis.section
      inputs:
        width: 50%
        columns: '100'
        mobile_columns: '1'
