      uuid: 29c58dd2-e56d-4a49-aa02-53e19d3dff68
      component_id: sdc.diagnosis.heading
      inputs:
        heading_text: 'Your Rights as a Patient'
        level: 2
        text_size: heading-responsive-4xl
