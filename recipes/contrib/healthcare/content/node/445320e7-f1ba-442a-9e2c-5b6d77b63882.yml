  field_biography:
    -
      value: "<p>Rachel Goldstein is a Licensed Independent Clinical Social Worker providing integrated behavioral health services at Saltmarsh Island Health. Growing up in Brookline, Massachusetts, Rachel earned her Bachelor of Arts in Psychology from Brandeis University before completing her Master of Social Work at Boston University.&nbsp;</p><p>After working in community mental health for several years, she joined Saltmarsh Island's primary care team in 2015 to help integrate mental health services into primary care. Rachel provides brief counseling, care coordination, and crisis intervention for patients dealing with depression, anxiety, substance use, and other behavioral health concerns. Her integrated care model allows primary care providers to quickly connect patients with mental health support without the barriers of traditional referral processes.&nbsp;</p><p>Rachel specializes in cognitive-behavioral therapy and motivational interviewing, helping patients develop coping strategies and make positive changes. Fluent in English and conversational Hebrew, Rachel brings cultural competence to her work with diverse populations. She's passionate about reducing mental health stigma and regularly leads community education programs on topics like stress management, parenting, and grief.&nbsp;</p><p>Outside of work, Rachel is an accomplished pianist who performs at local nursing homes and community events. She also practices mindfulness meditation and leads a weekly meditation group at the Saltmarsh Island Community Center.</p>"
