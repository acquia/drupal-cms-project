  field_description:
    -
      value: "<h2>Compassionate Mental Healthcare</h2><p>Mental Health &amp; Psychiatry services at Saltmarsh Island Health provide comprehensive, confidential care for mental health and substance use concerns. Our team of psychiatrists, psychiatric nurse practitioners, licensed clinical social workers, and counselors offer therapy, medication management, and supportive services for depression, anxiety, and other mental health conditions. We understand that mental health is just as important as physical health, and we're here to support your emotional well-being without stigma or judgment.</p><h3>Mental Health Conditions We Treat</h3><p>Our mental health team provides care for depression and mood disorders, anxiety disorders including generalized anxiety, panic, and PTSD, bipolar disorder and mood stabilization, substance use disorders and addiction recovery, eating disorders, attention-deficit/hyperactivity disorder (ADHD), grief and loss counseling, and stress management and coping skills development. We tailor treatment to your specific needs, combining therapy and medication management as appropriate.</p><h3>Therapy and Counseling Services</h3><p>We offer individual therapy, couples and family counseling, group therapy for specific conditions or concerns, cognitive behavioral therapy (CBT) for anxiety and depression, dialectical behavior therapy (DBT) for emotion regulation, trauma-focused therapy for PTSD, and substance use counseling and recovery support. Our therapists use evidence-based approaches and work collaboratively with you to achieve your mental health goals.</p><h3>Integrated Mental Health Care</h3><p>Mental health affects physical health and vice versa. We work closely with your primary care provider to address both. Our integrated approach includes medication management by psychiatrists and psychiatric nurse practitioners, coordination with medical care for conditions affected by mental health, crisis intervention and safety planning, connection to community resources and support groups, and telemedicine visits for convenient access to care. We're committed to removing barriers to mental healthcare and making treatment accessible to all island residents.</p><p><strong>You don't have to struggle alone.</strong> If you're experiencing mental health concerns, call Harbor Hollow Hill Campus at (207) 555-4000 to schedule a confidential consultation. For mental health emergencies, call 988 (Suicide &amp; Crisis Lifeline) or visit our Emergency Department.</p>"
      format: full_html
