  field_biography:
    -
      value: "<p>David Okafor is an Emergency Medicine Physician Assistant who brings energy and expertise to Scalloper's Cove Urgent Care. Born in Lagos, Nigeria, David immigrated to the United States with his family as a teenager, settling in Houston, Texas. After earning his bachelor's degree in Biology from Rice University, he worked as a paramedic before pursuing his Master of Physician Assistant Studies from Baylor College of Medicine. He joined Saltmarsh Island Health in 2018. David excels in the fast-paced urgent care environment, adeptly managing acute injuries and illnesses that require immediate attention.&nbsp;</p><p>His paramedic background gives him excellent skills in emergency procedures, from suturing lacerations to managing cardiac emergencies. He's known for his calm demeanor under pressure and his ability to make patients feel at ease even in stressful situations. David also provides excellent patient education, ensuring people understand when to seek urgent care versus emergency room services.&nbsp;</p><p>Fluent in English and Igbo, David serves Cape Cod's West African immigrant community. He's passionate about emergency preparedness and regularly teaches CPR and first aid classes in the community. Outside of work, David is a dedicated marathon runner who's completed races on all seven continents. He also volunteers with a nonprofit providing medical care to underserved communities in Nigeria during his annual trips home.</p>"
