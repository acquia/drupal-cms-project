  field_description:
    -
      value: "<h2>Comprehensive Women's Healthcare</h2><p>Women's Health &amp; OB/GYN services at Saltmarsh Island Health provide expert, compassionate care for women throughout their lives. From annual exams and contraception counseling to prenatal care and menopause management, our team of physicians, certified nurse midwives, and women's health nurse practitioners support your health at every stage. We understand that women's healthcare is deeply personal, and we prioritize your comfort, privacy, and individual needs.</p><h3>Preventive and Routine Care</h3><p>We provide comprehensive preventive services including annual well-woman exams and Pap tests, breast exams and mammography coordination, contraception counseling and family planning, STI testing and treatment, HPV vaccination, preconception counseling and fertility evaluation, and bone density screening for osteoporosis. Regular preventive care helps us detect problems early and maintain your long-term health.</p><h3>Prenatal Care and Midwifery</h3><p>We're proud to offer prenatal care and delivery services right here on Saltmarsh Island for low-risk pregnancies. Our certified nurse midwives provide personalized prenatal visits, childbirth education and preparation, labor and delivery support at Harbor Hollow Hill Campus, postpartum care and breastfeeding support, and newborn care. For high-risk pregnancies or complications, we coordinate with mainland maternal-fetal medicine specialists while providing as much care as possible on the island.</p><h3>Gynecologic Care and Treatment</h3><p>Our women's health team diagnoses and treats irregular or heavy menstrual bleeding, pelvic pain and endometriosis, fibroids and ovarian cysts, urinary incontinence and pelvic floor disorders, menopause symptoms and hormone therapy, vaginal infections and sexually transmitted infections, and abnormal Pap smears requiring further evaluation. We offer minimally invasive gynecologic procedures at Harbor Hollow Hill Campus and coordinate complex surgical care when needed.</p><p><strong>Your health, your choice, your care.</strong> Call Harbor Hollow Hill Campus at (207) 555-4000 to schedule a women's health appointment. We're accepting new patients and welcome women of all ages.</p>"
      format: full_html
