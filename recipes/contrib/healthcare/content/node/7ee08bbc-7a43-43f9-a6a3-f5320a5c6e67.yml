  field_biography:
    -
      value: "<p>Sarah Mitchell is a Women's Health Nurse Practitioner dedicated to providing comprehensive gynecologic care at Saltmarsh Island Health. A Cape Cod native from Wellfleet, Sarah earned her BSN from Boston College before working as a labor and delivery nurse at Beth Israel Deaconess Medical Center. She completed her Women's Health Nurse Practitioner master's degree at Columbia University and returned home to Cape Cod in 2017.&nbsp;</p><p>Sarah provides a full range of women's health services, including annual well-woman exams, contraceptive counseling, menopause management, and treatment of gynecologic conditions. She has particular expertise in reproductive health and family planning, offering evidence-based, non-judgmental care that respects each woman's reproductive choices. Sarah also provides prenatal care in collaboration with Dr. Al-Rashid, the OB/GYN physician.&nbsp;</p><p>Passionate about women's health education, Sarah leads monthly women's health seminars covering topics from menstrual health to menopause. She's also involved in community outreach, providing free health screenings at local women's shelters. In her free time, Sarah is an avid runner who's completed multiple Boston Marathons and organizes an annual 5K run benefiting women's health initiatives. She also enjoys whale watching and serves as a volunteer naturalist for the Cape Cod National Seashore.</p>"
