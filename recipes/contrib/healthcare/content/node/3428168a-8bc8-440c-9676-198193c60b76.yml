      value: '<p>Join Saltmarsh Island Health for our annual Spring Wellness Walk celebrating community health and fitness.</p><ul><li data-list-item-id="e120a55cf7c2eaa600ff69a9ff76bf0a1">Guided 2-mile scenic walk around Harbor Hollow</li><li data-list-item-id="eae6860e54961fa7ee25075815cc23f45">Warm-up stretching session with physical therapists</li><li data-list-item-id="e00aeef74b9b36dabc02da9c6f7e67592">Heart health education and fitness tips</li><li data-list-item-id="e1c81d75b33636825bd28fbb57f84b2ed">Free wellness swag bags for participants</li><li data-list-item-id="e62bfa2798626cbb60b91a35ed760ad0b">Light refreshments and healthy snacks</li><li data-list-item-id="ea348230751ac6a0973d5b7d9605bdabe">Raffle prizes from local businesses</li></ul><p>Family-friendly event. Dogs on leash welcome. Registration appreciated but not required.</p>'
