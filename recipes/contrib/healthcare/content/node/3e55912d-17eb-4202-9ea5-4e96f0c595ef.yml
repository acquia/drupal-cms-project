  field_biography:
    -
      value: "<p>Thanh Nguyen is a Family Nurse Practitioner who has found their calling in urgent care at Scalloper's Cove. Born in Hanoi, Vietnam, Thanh immigrated to the United States with their family as a child, settling in Boston's Dorchester neighborhood. After earning a BSN from UMass Boston and working as an ER nurse for five years, Thanh pursued their nurse practitioner degree from Northeastern University, joining Saltmarsh Island Health in 2016.&nbsp;</p><p>Thanh thrives in the dynamic environment of urgent care, managing everything from minor injuries and infections to more serious acute conditions. Their emergency nursing background provides excellent preparation for rapid assessment and treatment of walk-in patients. Thanh is known for being both efficient and thorough, ensuring patients receive appropriate care while maintaining the quick turnaround necessary in urgent care settings.&nbsp;</p><p>Fluent in English and Vietnamese, Thanh serves Cape Cod's growing Vietnamese-American community. They're passionate about addressing healthcare disparities and have developed culturally tailored patient education materials in Vietnamese. Outside of work, Thanh is an accomplished amateur photographer specializing in nature photography, and their images of Cape Cod's landscapes have been featured in local galleries. They also volunteer as a medical interpreter for refugees and immigrants.</p>"
