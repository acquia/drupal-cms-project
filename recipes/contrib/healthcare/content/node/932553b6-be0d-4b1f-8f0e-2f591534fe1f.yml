  body:
    -
      value: "<p>As we approach flu season, Saltmarsh Island Health wants to help our community stay healthy and prepared. Influenza is more than just a bad cold—it's a serious respiratory illness that can lead to hospitalization and complications, especially for young children, older adults, pregnant women, and those with chronic health conditions.</p><p><strong>Get Vaccinated Early</strong><br>The single best way to protect yourself and your family from the flu is annual vaccination. Flu vaccines are now available at all Saltmarsh Island Health locations, including our primary care offices, pharmacy, and special vaccination clinics. We offer standard flu shots, high-dose vaccines for seniors 65+, and preservative-free options. Most insurance plans cover flu vaccines at no cost, and we offer affordable self-pay options for those without insurance.</p><p><strong>Recognize the Symptoms</strong><br>Flu symptoms typically come on suddenly and may include fever, cough, sore throat, body aches, headache, and extreme fatigue. Unlike the common cold, flu often causes high fever and severe body aches. If you experience difficulty breathing, chest pain, sudden dizziness, or persistent vomiting, seek immediate medical care at our Emergency Department or Scalloper's Cove Urgent Care.</p><p><strong>Know When Antiviral Treatment Helps</strong><br>Antiviral medications can reduce the severity and duration of flu symptoms when started within 48 hours of symptom onset. They're especially important for people at high risk of complications. Contact your healthcare provider promptly if you develop flu symptoms—don't wait to see if you get better on your own.</p><p><strong>Practice Prevention Year-Round</strong><br>Good hygiene habits help prevent flu spread: wash hands frequently with soap and water, avoid touching your face, cover coughs and sneezes with your elbow, clean frequently-touched surfaces, and stay home when you're sick. These simple practices protect both you and our island community.</p><p><strong>Special Considerations for Island Living</strong><br>Living on Saltmarsh Island means we're a close-knit community, which can accelerate flu spread. Getting vaccinated protects not just you, but also your neighbors, especially those too young or too sick to be vaccinated themselves. Community immunity works when enough people are protected.</p><p>To schedule your flu vaccination or learn more about staying healthy this flu season, contact your primary care provider or visit any Saltmarsh Island Health location. Walk-in flu shots are welcome at our pharmacy during regular business hours.</p>"
