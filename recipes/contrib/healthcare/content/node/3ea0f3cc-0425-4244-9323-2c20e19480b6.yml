      value: '<p>Learn to prepare healthy, flavorful meals that support your wellness goals in this hands-on cooking series.</p><ul><li data-list-item-id="e160392cb37738b9f9feb3089dd1c4d4a">Week 1: Heart-healthy Mediterranean dishes</li><li data-list-item-id="e5fcef802867c601c32037d797d8bd7a4">Week 2: Diabetes-friendly meal planning</li><li data-list-item-id="e4ae7aff7c799a63292e776a63c607168">Week 3: Anti-inflammatory cooking</li><li data-list-item-id="ea5ce2d137c1efe669c15f3aff47d7e14">Week 4: Budget-friendly healthy meals</li></ul><p>Each session includes:</p><ul><li data-list-item-id="e88806fc517c9fa361dc00301a496354b">Hands-on cooking instruction</li><li data-list-item-id="eee831ebee3feb71276c394e89fb02113">Nutrition education from registered dietitians</li><li data-list-item-id="eb0c4a8e74ea1ae7e576141009f73ff2a">Recipe cards and meal planning guides</li><li data-list-item-id="ed87e940bd8a8231a15e92819a5835a5f">Samples of prepared dishes</li></ul><p>Limited to 20 participants. Registration and pre-payment required. Financial assistance available.</p>'
