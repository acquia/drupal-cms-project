  field_biography:
    -
      value: "<p>Dr. Jamal Washington has been a cornerstone of primary care at Saltmarsh Island Health since 2012. A Cape Cod native, he returned to his roots after completing medical training at Morehouse School of Medicine and a family medicine residency at Boston Medical Center.&nbsp;</p><p>Dr. Washington is known throughout the community for his warm bedside manner and commitment to addressing the whole person, not just symptoms. His practice philosophy centers on building long-term relationships with patients and families, often caring for multiple generations. Dr. Washington has particular expertise in chronic disease management, preventive care, and behavioral health integration. He's pioneered several community health initiatives, including a diabetes prevention program and men's health awareness campaigns that have significantly improved health outcomes among Saltmarsh Island's underserved populations.&nbsp;</p><p>Beyond his clinical work, Dr. Washington serves on the board of the Saltmarsh Island Health Equity Coalition and coaches youth basketball at the local community center. He believes strongly in the social determinants of health and works tirelessly to ensure all residents have access to quality healthcare regardless of their circumstances.</p>"
