  field_description:
    -
      value: "<h2>Supporting Healthy Aging on Saltmarsh Island</h2><p>Geriatric Care at Saltmarsh Island Health is dedicated to helping older adults maintain their independence, health, and quality of life. Our providers have specialized training in the medical, social, and emotional needs of seniors. Whether you're an active retiree or managing multiple chronic conditions, we provide comprehensive care tailored to your goals and priorities.</p><h3>Comprehensive Geriatric Assessment</h3><p>We provide thorough geriatric assessments that go beyond standard medical exams to include medication review and management to reduce harmful drug interactions, cognitive screening for memory concerns, fall risk assessment and prevention strategies, functional ability evaluation for daily activities, nutritional assessment and guidance, social support and caregiver resources, and advance care planning discussions. This holistic approach helps us develop personalized care plans that address your full range of needs.</p><h3>Managing Multiple Chronic Conditions</h3><p>Many older adults manage several chronic conditions simultaneously. Our geriatric care team has expertise in coordinating complex care for conditions like heart disease and hypertension, diabetes and metabolic disorders, arthritis and chronic pain, COPD and other respiratory conditions, dementia and cognitive decline, osteoporosis and fracture prevention, and depression and anxiety in older adults. We work to simplify treatment plans while maximizing your health and independence.</p><h3>Aging in Place on the Island</h3><p>We understand that many island seniors want to age in place in the community they love. We support this goal by coordinating with home health services, connecting you with East Marsh Rehabilitation for physical and occupational therapy, working with social services for community resources, providing telemedicine visits when getting to appointments is difficult, and collaborating with family caregivers. Our goal is to help you live safely and independently at home for as long as possible.</p><p><strong>Accepting new patients age 65 and older.</strong> Call Harbor Hollow Primary Care at (207) 555-4100 to schedule a comprehensive geriatric assessment.</p>"
      format: full_html
