  field_biography:
    -
      value: "<p>Dr. Priya Kapoor is a non-invasive cardiologist specializing in heart failure and cardiac imaging. She grew up in New Delhi before moving to the United States for college, eventually earning her medical degree from Johns Hopkins School of Medicine. After completing internal medicine residency at Cleveland Clinic and cardiology fellowship at Duke University, she joined Saltmarsh Island Health in 2018, complementing Dr. Patel's interventional cardiology practice. Dr. Kapoor's expertise includes echocardiography, cardiac MRI, and nuclear cardiology.</p><p>She has a particular interest in heart failure management and cardiac rehabilitation, working closely with patients to optimize their heart function through medication management, lifestyle modifications, and advanced therapies. Her research on racial disparities in heart failure outcomes has been published in leading cardiology journals. Known for her patience and teaching ability, Dr. Kapoor ensures her patients understand their cardiac conditions and feel empowered in their care.&nbsp;</p><p>She's fluent in English, Hindi, and Punjabi, serving South Asian patients throughout Cape Cod. Outside of medicine, she's an accomplished classical Indian dancer and teaches bharatanatyam to children at the Saltmarsh Island Cultural Center. She also enjoys hiking and has explored many of the Cape's beautiful conservation areas.</p>"
