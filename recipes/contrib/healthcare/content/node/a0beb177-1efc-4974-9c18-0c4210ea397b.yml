  field_biography:
    -
      value: "<p>Emily Zhao is a surgical Physician Assistant who plays a vital role in the general surgery department at Saltmarsh Island Health. Born in Beijing and raised in San Diego, Emily earned her bachelor's degree in Biology from UC San Diego before pursuing physician assistant training at Duke University. After completing her PA degree in 2016, she completed a surgical residency fellowship and joined Saltmarsh Island's surgical team in 2017.</p><p>Emily assists in a wide range of surgical procedures, from routine appendectomies to complex abdominal surgeries. She's particularly skilled in laparoscopic techniques and robotic-assisted surgery. Her responsibilities include pre-operative patient education, intra-operative assistance, and post-operative care management. Emily's meticulous attention to detail and strong clinical judgment have made her an invaluable member of the surgical team.&nbsp;</p><p>Fluent in English and Mandarin, Emily ensures Chinese-speaking patients feel comfortable and informed throughout their surgical experience. She's dedicated to surgical education and regularly mentors PA students completing their surgical rotations. Outside the operating room, Emily is an accomplished violinist who performs with the Cape Cod Symphony Orchestra. She also practices tai chi and volunteers teaching tai chi classes to surgical patients as part of their recovery programs.</p>"
