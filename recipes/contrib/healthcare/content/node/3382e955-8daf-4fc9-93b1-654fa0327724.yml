  field_description:
    -
      value: '<p>Saltmarsh Island Health partners with the American Red Cross for our quarterly community blood drive.</p><ul><li data-list-item-id="e5a7ded49fefa3a5bcdafe2fa5a7c3c82">Whole blood donation (45-60 minutes)</li><li data-list-item-id="ed10a91e045358997ce9471b75becfd0f">Power Red (double red cell) donation available</li><li data-list-item-id="e3b3d2072d83136db7ac175b5ddd36e2f">Experienced Red Cross phlebotomy team</li><li data-list-item-id="e67396dbc8188c3deda0803bf5f8e178c">Pre-donation health screening</li><li data-list-item-id="eff9e772749dcd21f16b1bd9f3368d56a">Complimentary snacks and beverages</li><li data-list-item-id="e04740499e5ec7806fb8f12fe4bf61b10">Donor rewards and t-shirts</li></ul><p>Donation eligibility requirements:</p><ul><li data-list-item-id="e3c951a949ca26a7424277eb36b3bb974">Age 16+ (parental consent required for 16-17)</li><li data-list-item-id="e144cc23205e2fd05b309e5f500f3b396">Weigh at least 110 pounds</li><li data-list-item-id="e9674cfd8399cbd0c86b804b27e1374a4">Be in general good health</li><li data-list-item-id="ebeb1613e8d0bd151891d97612baefab7">Bring photo ID</li></ul><p>Appointments strongly encouraged. Walk-ins accepted based on availability. Each donation can save up to three lives.</p>'
