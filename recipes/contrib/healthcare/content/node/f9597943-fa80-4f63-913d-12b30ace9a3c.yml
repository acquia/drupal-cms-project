  field_description:
    -
      value: "<h2>Caring for Island Children from Birth to Adulthood</h2><p>Pediatric Care at Saltmarsh Island Health is dedicated to keeping your children healthy at every stage of development. Our board-certified pediatricians and pediatric nurse practitioners provide compassionate, expert care for infants, children, and teenagers. From your baby's first checkup to sports physicals for high schoolers, we're here to support your family's health journey.</p><h3>Well-Child Care</h3><p>We provide comprehensive well-child visits following the American Academy of Pediatrics recommended schedule. These visits include physical examinations and growth monitoring, developmental screenings and milestone tracking, complete immunization series including required vaccines for school, vision and hearing screening, nutrition and feeding guidance for parents, behavioral and social-emotional development assessment, and anticipatory guidance for each stage of childhood. Regular well-child visits help us catch potential problems early and ensure your child is thriving.</p><h3>Sick Visits and Acute Care</h3><p>When your child is ill or injured, we offer same-day or next-day sick visits for ear infections and sore throats, respiratory infections including croup and bronchiolitis, stomach bugs and dehydration, rashes and skin conditions, minor injuries and wound care, and asthma flare-ups. For after-hours needs, Scalloper's Cove Urgent Care is open evenings and weekends, and Harbor Hollow Hill Campus has 24/7 emergency services for serious concerns.</p><h3>Supporting Island Families</h3><p>We understand the unique aspects of raising children on Saltmarsh Island. Whether your family has lived here for generations or you're new to the island, we're committed to providing accessible, family-centered care. We work closely with island schools, coordinate with visiting pediatric specialists when needed, and help families navigate healthcare when ferry schedules are challenging.</p><p><strong>Welcoming new patients birth through age 18.</strong> Call Harbor Hollow Primary Care at (207) 555-4100 to establish care for your child or teen.</p>"
