  field_description:
    -
      value: "<h2>Keeping Island Residents Moving</h2><p>Orthopedics &amp; Joint Care at Saltmarsh Island Health provides expert treatment for bone, joint, and musculoskeletal conditions. Whether you're a commercial fisherman with a work-related injury, an active retiree with arthritis, or an athlete with a sports injury, our orthopedic specialists help you get back to the activities you love. We offer both surgical and non-surgical treatment options tailored to your lifestyle and goals.</p><h3>Conditions and Injuries We Treat</h3><p>Our orthopedic team has extensive experience treating fractures and broken bones, arthritis of the hip, knee, shoulder, and hands, rotator cuff tears and shoulder injuries, ACL tears and other knee ligament injuries, meniscus tears and cartilage damage, carpal tunnel syndrome and hand conditions, back and neck pain, and sprains, strains, and tendonitis. We understand the physical demands of island life and maritime work, and tailor treatment plans accordingly.</p><h3>Comprehensive Treatment Options</h3><p>We offer a full range of orthopedic services including fracture care and casting, joint injections for pain and inflammation, physical therapy referrals to East Marsh Rehabilitation, occupational medicine for work-related injuries, arthroscopic surgery for joint problems, joint replacement surgery at Harbor Hollow Hill Campus, and sports medicine for athletes of all ages. Our visiting orthopedic surgeons perform procedures at Harbor Hollow Hill Campus and provide regular clinic hours for consultations and follow-up care.</p><h3>Rapid Access for Injuries</h3><p>For acute injuries, Scalloper's Cove Urgent Care provides X-rays and initial orthopedic evaluation seven days a week. Serious fractures and joint injuries are stabilized and referred directly to our orthopedic team. Our surgeons visit the island twice weekly and are available for urgent consultations via telemedicine between visits. This ensures you receive timely, expert orthopedic care without unnecessary trips to the mainland.</p><p><strong>Don't let pain slow you down.</strong> Call Harbor Hollow Hill Campus at (207) 555-4000 to schedule an orthopedic consultation, or visit Scalloper's Cove Urgent Care for immediate injury evaluation.</p>"
      format: full_html
