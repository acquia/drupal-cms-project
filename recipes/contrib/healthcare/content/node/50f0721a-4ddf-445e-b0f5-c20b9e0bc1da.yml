      value: "<p>Located in working waterfront district, adjacent to commercial fishing docks. Seasonal ferry service to mainland (Scalloper's Cove terminal, 0.2 miles). Limited island shuttle service - call for pickup. Marine radio monitoring channel 16 for vessel-based emergencies.</p>"
