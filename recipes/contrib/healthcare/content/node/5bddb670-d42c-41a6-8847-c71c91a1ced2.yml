  field_description:
    -
      value: "<h2>Expert Heart Care for Island Residents</h2><p>Cardiology &amp; Heart Care at Saltmarsh Island Health provides comprehensive cardiovascular services to diagnose, treat, and manage heart conditions. Our visiting cardiologists from the mainland, along with our on-island care coordination team, deliver expert care close to home. From routine cardiac monitoring to management of complex heart disease, we're here to keep your heart healthy.</p><h3>Conditions We Treat</h3><p>Our cardiology team has expertise in managing coronary artery disease and angina, heart failure and cardiomyopathy, arrhythmias including atrial fibrillation, valvular heart disease, hypertension and resistant high blood pressure, high cholesterol and lipid disorders, peripheral artery disease, and heart attack recovery and cardiac rehabilitation. We work closely with your primary care provider to create integrated treatment plans that address all aspects of your cardiovascular health.</p><h3>Diagnostic Services Available</h3><p>Harbor Hollow Hill Campus offers comprehensive cardiac diagnostic testing including electrocardiograms (EKGs), echocardiography and cardiac ultrasound, stress testing for coronary artery disease, Holter monitors and event recorders for arrhythmia diagnosis, and cardiac CT and imaging studies. When advanced procedures like cardiac catheterization or electrophysiology studies are needed, we coordinate referrals to mainland specialists and provide seamless follow-up care on the island.</p><h3>Visiting Cardiology Clinics</h3><p>Board-certified cardiologists visit Harbor Hollow Hill Campus twice monthly for consultations, follow-up visits, and treatment planning. Between visits, our on-island care team monitors your condition, adjusts medications as needed, and provides urgent consultations via telemedicine when necessary. For cardiac emergencies, our 24/7 Emergency Department is equipped to stabilize and transfer patients requiring advanced interventions.</p><p><strong>Heart health matters.</strong> If you have cardiac symptoms or risk factors, ask your primary care provider for a cardiology referral, or call Harbor Hollow Hill Campus at (207) 555-4000 to schedule a consultation.</p>"
      format: full_html
