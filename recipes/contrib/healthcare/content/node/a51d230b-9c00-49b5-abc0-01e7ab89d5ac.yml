  field_biography:
    -
      value: "<p>Kevin Park is a licensed Occupational Therapist who has been helping Saltmarsh Island residents regain independence in daily activities since 2016. Born in Seoul, South Korea, and raised in Los Angeles, Kevin earned his Bachelor of Science in Occupational Therapy from the University of Southern California.&nbsp;</p><p>His passion for helping people overcome physical challenges and return to meaningful activities drew him to this rewarding field. Kevin provides occupational therapy services across the lifespan, from children with developmental delays to seniors recovering from stroke or injury. He specializes in hand therapy, neurological rehabilitation, and adaptive equipment training. Kevin's creative problem-solving abilities shine as he helps patients find new ways to accomplish tasks that may have become difficult due to injury, illness, or aging.&nbsp;</p><p>He's particularly skilled at home safety assessments and recommending modifications that allow people to age in place safely. Fluent in English and Korean, Kevin serves Cape Cod's Korean-American community with culturally informed care. He's an advocate for accessibility and serves on the Saltmarsh Island Accessibility Advisory Board, working to make public spaces more inclusive. In his free time, Kevin is an avid woodworker who builds adaptive equipment and assistive devices for patients who can't afford commercial options. He also enjoys photography and has documented the stories of many of his patients' recovery journeys.</p>"
