  field_biography:
    -
      value: "<p>Miguel Santos is a board-certified Physician Assistant specializing in orthopedic surgery. Originally from Rio de Janeiro, Brazil, Miguel moved to Massachusetts for college and discovered his passion for healthcare while working as an EMT. He earned his Bachelor of Science in Exercise Science from UMass Amherst before completing his Master of Physician Assistant Studies at Massachusetts College of Pharmacy and Health Sciences.</p><p>He joined the orthopedics team at Saltmarsh Island Health in 2015. Miguel works closely with the orthopedic surgeons, providing both pre-operative and post-operative care for joint replacement and sports injury patients. He's skilled in casting, splinting, joint injections, and wound care. His background in exercise science gives him unique insight into rehabilitation and recovery, and he works closely with the physical therapy team to optimize patient outcomes.&nbsp;</p><p>Patients appreciate his encouraging attitude and detailed explanations of their recovery process. Fluent in English, Spanish, and Portuguese, Miguel serves Cape Cod's Latino and Brazilian communities. He's passionate about injury prevention and leads educational workshops on safe lifting techniques and fall prevention for seniors. Outside of work, he's a competitive soccer player who coaches youth soccer and organizes an annual sports medicine clinic for young athletes. He also enjoys surfing and can often be found at Coast Guard Beach on summer mornings.</p>"
