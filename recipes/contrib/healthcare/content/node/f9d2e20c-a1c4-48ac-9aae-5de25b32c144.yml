  field_biography:
    -
      value: "<p>Jennifer Martinez is a Registered Dietitian and Certified Diabetes Care and Education Specialist who provides comprehensive nutritional counseling at Saltmarsh Island Health. Born and raised in Miami, Florida, Jennifer earned her Bachelor of Science in Nutritional Sciences from Florida International University before completing her dietetic internship at Brigham and Women's Hospital.&nbsp;</p><p>She joined Saltmarsh Island in 2017, establishing the hospital's diabetes education and medical nutrition therapy programs. Jennifer works with patients managing a wide range of conditions including diabetes, heart disease, kidney disease, and gastrointestinal disorders.&nbsp;</p><p>She's particularly passionate about diabetes prevention and management, having developed a comprehensive diabetes self-management education program that has helped hundreds of patients improve their blood sugar control and reduce medication needs. Her approach emphasizes sustainable lifestyle changes rather than restrictive dieting, meeting patients where they are.&nbsp;</p><p>Fluent in English and Spanish, Jennifer provides culturally tailored nutrition education that respects diverse food traditions. She teaches cooking classes featuring healthy versions of traditional recipes from various cultures. Outside of work, Jennifer is an avid home cook and food blogger who shares healthy recipes inspired by her Cuban heritage. She also volunteers with local food banks, helping to increase access to fresh, nutritious food for food-insecure families.</p>"
