  field_description:
    -
      value: "<h2>When You Can't Wait for an Appointment</h2><p>Urgent Care at Scalloper's Cove provides walk-in medical treatment for minor illnesses and injuries that need attention today but aren't life-threatening emergencies. Located in the heart of the working waterfront, we're open seven days a week including evenings to care for you when your primary care office is closed. No appointment necessary—just walk in when you need care.</p><h3>Conditions We Treat</h3><p>Our urgent care providers treat minor injuries including cuts, lacerations, and wound care, sprains, strains, and suspected fractures, burns and minor skin injuries, foreign body removal, and occupational injuries common in maritime work. We also treat illnesses such as colds, flu, and respiratory infections, ear infections and sore throats, urinary tract infections, skin rashes and infections, stomach bugs and dehydration, allergic reactions, and minor eye problems. We have on-site X-ray capabilities and can perform rapid diagnostic testing for flu, strep throat, and other common infections.</p><h3>Occupational Health Services</h3><p>Scalloper's Cove Urgent Care is uniquely positioned to serve the island's maritime workforce. We provide treatment for work-related injuries and accidents, drug and alcohol screening for maritime compliance, Department of Transportation (DOT) physical exams for commercial fishermen, workers' compensation injury evaluation and documentation, and return-to-work evaluations after injury. Our providers understand the physical demands of commercial fishing and maritime work and provide practical, efficient care that gets you back to work safely.</p><h3>When to Choose Urgent Care vs. Emergency</h3><p>Urgent care is appropriate for conditions that need treatment today but aren't life-threatening. For life-threatening emergencies such as chest pain, difficulty breathing, severe bleeding, stroke symptoms, or serious injuries, call 911 or go directly to the Emergency Department at Harbor Hollow Hill Campus, which is open 24/7. If you're unsure whether your condition is an emergency, our staff can help you decide the best place to receive care.</p><p><strong>Walk-ins welcome seven days a week.</strong> Scalloper's Cove Urgent Care is open Monday through Sunday, 9am to 7pm. No appointment needed. For questions, call (207) 555-4500. Located at 42 Dockside Way in Scalloper's Cove.</p>"
