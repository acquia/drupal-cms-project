  body:
    -
      value: '<p>The Emergency Department at Saltmarsh Island Health has been honored with the Emergency Nurses Association''s prestigious Lantern Award for Emergency Department Excellence. This national recognition celebrates our emergency team''s exceptional commitment to patient safety, evidence-based practice, and continuous quality improvement.</p><p>The Lantern Award is one of the most sought-after distinctions in emergency nursing, recognizing departments that demonstrate expertise in leadership, practice, education, advocacy, and research. Only emergency departments that meet rigorous standards for patient care quality, staff development, and community engagement achieve this recognition.</p><p>"This award reflects the dedication and expertise of our entire emergency care team," says Dr. James Foster, Emergency Department Medical Director. "From our nurses and physicians to our technicians and support staff, everyone contributes to creating a culture of safety and excellence. We''re honored to be recognized for work that directly impacts the health and wellbeing of our island community."</p><p>Key initiatives that contributed to the award include implementation of advanced sepsis protocols, reduced door-to-provider times, enhanced pain management practices, and improved patient satisfaction scores. The emergency department also leads community education programs on topics ranging from CPR training to injury prevention.</p><p>Saltmarsh Island Health''s Emergency Department is open 24/7/365, staffed by board-certified emergency physicians and specially trained emergency nurses. The department treats more than 15,000 patients annually, ranging from minor injuries to life-threatening emergencies.</p>'
