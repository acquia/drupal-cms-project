  field_description:
    -
      value: "<h2>Always Here When Seconds Count</h2><p>The Emergency Department at Harbor Hollow Hill Campus is open 24 hours a day, 7 days a week, 365 days a year to provide immediate care for medical emergencies and serious injuries. Our board-certified emergency medicine physicians and experienced emergency nurses are trained to handle everything from heart attacks and strokes to serious trauma and acute illnesses. When you or a loved one faces a medical emergency, our team is ready to provide rapid, expert care.</p><h3>When to Use the Emergency Department</h3><p>The Emergency Department is for life-threatening conditions and serious injuries that require immediate medical attention. Come to the ED or call 911 for chest pain or pressure, difficulty breathing or shortness of breath, sudden severe headache or vision changes, signs of stroke including facial drooping, arm weakness, or speech difficulty, severe bleeding or deep wounds, serious burns, broken bones or dislocations, severe abdominal pain, poisoning or drug overdose, allergic reactions with difficulty breathing, head injuries or loss of consciousness, and suicidal thoughts or mental health crisis. Our emergency team is equipped to stabilize and treat all of these conditions.</p><h3>Emergency Services Available</h3><p>Our Emergency Department provides rapid diagnostic testing including stat laboratory tests, X-ray, CT scanning, and ultrasound, cardiac monitoring and EKG for heart problems, treatment for heart attack including clot-busting medications, stroke protocols with rapid assessment and treatment, trauma care for serious injuries, emergency surgery when needed, critical care stabilization for patients requiring intensive care, and air ambulance coordination for patients needing specialized care at mainland trauma centers. We're equipped to handle virtually any medical emergency that occurs on Saltmarsh Island.</p><h3>What to Expect in the ED</h3><p>When you arrive at the Emergency Department, you'll be quickly assessed by our triage nurse who determines the urgency of your condition. Patients with life-threatening conditions are taken back immediately. Others are seen based on medical priority rather than arrival order. This means you may wait while more critical patients are treated first. Our ED can be busy, especially during peak times, but rest assured we're working as quickly as possible to care for everyone safely and effectively.</p><p><strong>For medical emergencies, call 911 or come directly to Harbor Hollow Hill Campus Emergency Department</strong> at 123 Harborview Drive. For non-emergency urgent care needs, visit Scalloper's Cove Urgent Care, open 9am-7pm daily. The Emergency Department entrance is clearly marked and accessible 24/7.</p>"
