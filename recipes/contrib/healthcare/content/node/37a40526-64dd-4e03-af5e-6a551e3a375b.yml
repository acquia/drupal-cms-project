  field_description:
    -
      value: "<h2>Your Healthcare Home on Saltmarsh Island</h2><p>Family Medicine at Saltmarsh Island Health is the foundation of our care. Our board-certified family medicine physicians provide comprehensive healthcare for patients of all ages—from newborns to great-grandparents—all in one place. Whether you need a well-child checkup, help managing diabetes, or treatment for the flu, our team is here for you.</p><h3>What We Offer</h3><p>Our family medicine providers offer a full range of services including annual wellness exams and physical assessments, preventive screenings for cancer, heart disease, and other conditions, chronic disease management for diabetes, hypertension, asthma, and arthritis, acute illness care for colds, flu, infections, and minor injuries, pediatric care with well-child visits and immunizations, women's health services including Pap tests and contraception counseling, minor procedures such as wound care and joint injections, and care coordination with specialists and other services.</p><h3>Building Lasting Relationships</h3><p>We believe in continuity of care. When you choose Harbor Hollow Primary Care as your healthcare home, you'll see the same provider or care team for most visits. This means your doctor knows your history, understands your health goals, and can help you make informed decisions about your care. We offer same-day or next-day appointments for urgent needs and work closely with visiting specialists at Harbor Hollow Hill Campus when you need additional expertise.</p><h3>Serving the Island Community</h3><p>Our practice serves year-round island residents and seasonal visitors alike. We understand the unique challenges of island life—from coordinating care when ferry schedules are limited to managing chronic conditions when specialists visit monthly. We're here to keep you healthy, wherever the tide takes you.</p><p><strong>Ready to establish care?</strong> Call Harbor Hollow Primary Care at (207) 555-4100 to schedule your appointment. We're accepting new patients of all ages.</p>"
      format: full_html
