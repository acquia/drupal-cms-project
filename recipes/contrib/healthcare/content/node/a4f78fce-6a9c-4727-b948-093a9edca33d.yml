  field_biography:
    -
      value: "<p>Dr. Amanda Foster is the director of physical therapy at East Marsh Rehabilitation &amp; Physical Therapy. A Vermont native, Amanda earned her Doctor of Physical Therapy from the University of Vermont before completing an orthopedic residency at Massachusetts General Hospital. She joined Saltmarsh Island Health in 2014, helping to establish the island's comprehensive rehabilitation program. Amanda specializes in orthopedic and sports physical therapy, treating conditions ranging from post-surgical rehabilitation to sports injuries and chronic pain.&nbsp;</p><p>She's particularly skilled in manual therapy techniques and therapeutic exercise prescription. Her evidence-based approach combines the latest research with individualized treatment plans tailored to each patient's goals. Amanda is board-certified as an Orthopedic Clinical Specialist, representing advanced expertise in her field.&nbsp;</p><p>Passionate about injury prevention and wellness, Amanda leads community programs on fall prevention for seniors and injury prevention for athletes. She's a regular presence at local road races, providing pre-race stretching guidance and post-race injury assessment. Outside of work, Amanda is an accomplished triathlete who's completed several Ironman competitions. She also enjoys hiking with her rescue dog and is an active volunteer with Cape Cod animal rescue organizations.</p>"
