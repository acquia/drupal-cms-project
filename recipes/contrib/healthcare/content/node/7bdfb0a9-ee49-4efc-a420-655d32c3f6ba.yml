  field_biography:
    -
      value: "<p>Dr. Christopher Williams is a board-certified Clinical Pharmacist who plays a crucial role in medication management at Saltmarsh Island Health. A Boston native, Chris earned his Doctor of Pharmacy degree from Northeastern University before completing a pharmacy practice residency and an ambulatory care specialty residency at Brigham and Women's Hospital. He joined Saltmarsh Island in 2016 to help establish clinical pharmacy services integrated into primary care.&nbsp;</p><p>Chris works collaboratively with physicians and nurse practitioners to optimize medication therapy for patients with complex conditions, particularly those with diabetes, hypertension, and heart disease. He conducts comprehensive medication reviews, identifies drug interactions and side effects, and makes evidence-based recommendations to improve outcomes while reducing costs. His pharmacotherapy expertise is invaluable for patients taking multiple medications who need careful coordination.&nbsp;</p><p>Chris is passionate about medication safety and patient education. He leads medication management clinics where he meets with patients to review their medications, answer questions, and ensure they understand proper use. He also provides education to healthcare providers on new medications and treatment guidelines. Outside of work, Chris is an amateur homebrewer and coffee roaster who enjoys the science behind fermentation and extraction. He volunteers teaching medication safety classes to seniors and serves on the Cape Cod Coalition for Opioid Prevention.</p>"
