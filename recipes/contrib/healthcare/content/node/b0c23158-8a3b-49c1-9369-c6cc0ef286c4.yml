  field_description:
    -
      value: "<h2>Helping You Move Better and Live Fully</h2><p>Physical Therapy &amp; Rehabilitation at East Marsh Rehabilitation provides expert therapy services to help you recover from injury, surgery, or illness and regain your independence. Our licensed physical therapists, occupational therapists, and speech-language pathologists work with patients of all ages to reduce pain, improve mobility, strengthen function, and enhance quality of life. Whether you're recovering from joint replacement or managing chronic pain, we're here to support your recovery journey.</p><h3>Physical Therapy Services</h3><p>Our physical therapists provide specialized treatment for post-surgical rehabilitation after joint replacement, fractures, or other surgeries, sports injury recovery and return-to-activity programs, back and neck pain treatment, balance training and fall prevention for older adults, chronic pain management, work-related injury rehabilitation, neurological rehabilitation after stroke or brain injury, and manual therapy and therapeutic exercise. We create personalized treatment plans based on your specific condition and functional goals.</p><h3>Occupational Therapy Services</h3><p>Occupational therapists help you perform daily activities more easily and independently. We provide hand and upper extremity rehabilitation, activities of daily living training after injury or illness, adaptive equipment evaluation and training, home safety assessments for fall prevention, arthritis management and joint protection techniques, work conditioning and ergonomic training, cognitive rehabilitation after stroke or brain injury, and pediatric occupational therapy for developmental delays. Our goal is to help you participate fully in the activities that matter most to you.</p><h3>Serving the Island Community</h3><p>Located in East Marsh, our rehabilitation facility serves island residents year-round. We offer convenient morning, afternoon, and early evening appointments to fit your schedule. Many patients walk or bike to therapy from nearby neighborhoods. We work closely with orthopedic surgeons, primary care providers, and other specialists to coordinate your care. For patients who have difficulty getting to our clinic, we can arrange home health physical therapy visits.</p><p><strong>Ready to start your recovery?</strong> Most physical and occupational therapy services require a prescription from your provider. Ask your doctor for a referral to East Marsh Rehabilitation, or call us directly at (207) 555-4600 with questions.</p>"
