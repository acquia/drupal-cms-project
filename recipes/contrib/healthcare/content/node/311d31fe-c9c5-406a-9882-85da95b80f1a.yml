  body:
    -
      value: '<p>James Morrison''s journey to recovery wasn''t a straight line. The 42-year-old fishing boat captain from Scalloper''s Cove spent years managing depression on his own before substance use complicated his struggle. "I thought I could handle it myself," James shares. "I didn''t want people to know I was struggling. In our community, you''re supposed to be tough, weather any storm. Asking for help felt like weakness."</p><p><strong>The Crisis Point</strong><br>When James''s drinking began affecting his work and relationships, his sister encouraged him to seek help. "She''d been through her own journey with anxiety and told me about the mental health services at Saltmarsh Island Health," he recalls. "I was skeptical, but desperate enough to try."</p><p>James scheduled an evaluation with the Mental Health &amp; Psychiatry team. "Walking through those doors was the hardest thing I''d ever done," he admits. "But Dr. Patel didn''t judge me. She listened, asked good questions, and helped me understand that what I was experiencing—depression and substance use disorder—were medical conditions, not moral failures."</p><p><strong>Building a Treatment Team</strong><br>James''s treatment plan involved multiple services: medication management with his psychiatrist, weekly therapy sessions with a counselor, and connection to community support groups. "What made the difference was having everyone under one roof," James explains. "My psychiatrist, therapist, and primary care doctor all communicated with each other. They weren''t just treating symptoms—they were treating me as a whole person."</p><p>The social work team also connected James with practical support: assistance applying for temporary disability when he needed time off work, help finding sober housing when his home environment became a barrier to recovery, and links to community resources including financial counseling and job training programs.</p><p><strong>The Role of Community</strong><br>"Early in recovery, I felt isolated," James shares. "The therapist connected me with a support group that met at the hospital. Hearing other people''s stories, realizing I wasn''t alone—that was huge. We still meet weekly, and some of those people have become close friends."</p><p>James also found purpose in helping others. He now volunteers with the Saltmarsh Island Recovery Community, sharing his story and offering hope to others facing similar struggles. "When I can tell someone ''I''ve been there, and I''m still here,'' that means something," he says.</p><p><strong>Life in Recovery</strong><br>Two years into his recovery journey, James is back on the water, captaining fishing charters and rebuilding relationships with his family. "Recovery isn''t about being perfect," he reflects. "I still have hard days. But now I have tools, support, and people I can call when I''m struggling. I take my medication, I go to therapy, I show up for my support group. Those things keep me well."</p><p>His advice to others facing mental health or substance use challenges? "You don''t have to hit rock bottom before you seek help. You don''t have to do this alone. The stigma, the shame, the fear—those things kept me sick for years. Asking for help was the bravest thing I ever did, and it saved my life."</p><p><em>If you or someone you love is struggling with mental health or substance use, Saltmarsh Island Health offers confidential, compassionate care. Call our Mental Health &amp; Psychiatry team at (555) 842-MIND or speak with your primary care provider. Crisis support is available 24/7 through the National Suicide Prevention Lifeline at 988.</em></p>'
