  field_biography:
    -
      value: "<p>Jordan Taylor is an Adult-Gerontology Nurse Practitioner who joined Saltmarsh Island Health in 2018. Growing up in Portland, Maine, Jordan was inspired to pursue nursing after volunteering at a community health center during college. They earned a BSN from University of Maine and later completed an Adult-Gerontology Nurse Practitioner master's program at Yale School of Nursing, graduating with honors.&nbsp;</p><p>Jordan specializes in adult and geriatric primary care, with particular expertise in chronic disease management and geriatric syndromes. Their patient-centered approach emphasizes shared decision-making and individualized care plans that respect each patient's values and goals. Jordan is especially skilled at managing complex patients with multiple chronic conditions, coordinating care across specialists and settings to ensure continuity and quality.&nbsp;</p><p>As a non-binary healthcare provider, Jordan brings important perspective on LGBTQ+ healthcare needs and has become a trusted provider for many in the community seeking affirming, knowledgeable care. They lead diversity and inclusion training for Saltmarsh Island Health staff and serve on the hospital's LGBTQ+ Health Advisory Committee. Outside of work, Jordan enjoys painting watercolors of Cape Cod landscapes, practicing meditation, and volunteering with a local transgender support group.</p>"
