      uuid: 866af2c3-9958-404f-b166-4992a19f7299
      component_id: sdc.convene_theme.typography
      inputs:
        description: 'Parking information is available on the venue page. Street parking is available nearby, and the venue has a small lot for registered attendees. Public transportation is also accessible from the location.'
        heading_tag: div
    -
