      uuid: ab2a4ef4-1231-461c-8655-7b556d2bdaca
      component_id: sdc.convene_theme.typography
      inputs:
        description: 'Bring your confirmation email or ticket on your phone. A notebook and pen are useful for taking notes during sessions. Comfortable shoes are recommended as you will be moving between rooms.'
        heading_tag: div
    -
