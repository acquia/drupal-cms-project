langcode: en
status: true
dependencies:
  config:
    - filter.format.content_format
  module:
    - ckeditor5
format: content_format
editor: ckeditor5
settings:
  toolbar:
    items:
      - heading
      - bold
      - italic
      - underline
      - specialCharacters
      - link
      - bulletedList
      - numberedList
      - blockQuote
      - insertTable
      - drupalMedia
      - '|'
      - indent
      - outdent
      - horizontalLine
      - alignment
      - style
      - '|'
      - undo
      - redo
      - removeFormat
      - sourceEditing
  plugins:
    ckeditor5_alignment:
      enabled_alignments:
        - center
        - justify
        - left
        - right
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
        - heading4
        - heading5
        - heading6
    ckeditor5_list:
      properties:
        reversed: true
        startIndex: true
        styles: false
      multiBlock: true
    ckeditor5_sourceEditing:
      allowed_tags: {  }
    ckeditor5_style:
      styles:
        -
          label: Button
          element: '<a class="button button--primary">'
        -
          label: 'Secondary Button'
          element: '<a class="button button--secondary">'
        -
          label: 'Large paragraph'
          element: '<p class="paragraph--large">'
    linkit_extension:
      linkit_enabled: true
      linkit_profile: default
    media_media:
      allow_view_mode_override: true
image_upload:
  status: false
