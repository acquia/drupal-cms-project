  field_body:
    -
      value: "<h2>Black History Month Assembly Success</h2><p class=\"paragraph--large\">This morning, Willow Meadow Primary held a wonderful whole-school assembly to mark Black History Month.</p><p class=\"paragraph--large\">The assembly was a tremendous success, with pupils from Years 5 and 6 leading presentations that educated and inspired our entire school community.\L\LThe assembly focused on celebrating the achievements and contributions of Black individuals throughout history, from pioneering figures in science and medicine to influential leaders in the arts, sports, and civil rights movements.</p><hr><h3>Pupil Performances</h3><p>Year 6 pupils delivered powerful spoken word performances they had written themselves, exploring themes of equality, diversity, and the importance of understanding history. Their confidence and eloquence left many staff and pupils moved by their words.\L\LYear 5 created an engaging presentation highlighting inspiring figures including Rosa Parks, Nelson Mandela, Maya Angelou, and Katherine Johnson. They used multimedia presentations, including video clips and music, to bring their stories to life.</p><p>&nbsp;</p><h3>Learning About Important Figures</h3><p>The children shared fascinating facts about numerous influential Black figures. Highlights included learning about Mary Seacole's pioneering nursing work during the Crimean War, Marcus Rashford's campaign to end child food poverty, and Dr. Maggie Aderin-Pocock's incredible career as a space scientist.\L\LOur youngest pupils in Reception and Key Stage 1 learned about Floella Benjamin and her work as a children's author and broadcaster, while also discovering that she was made a Baroness for her contributions to society.</p>"
