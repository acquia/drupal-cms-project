  field_content:
    -
      value: '<h2>What to report</h2><p>Use this form to report issues including damaged or unsafe play equipment, broken fencing, graffiti, fallen trees or dangerous branches, damaged paths or surfaces, vandalism to park buildings or facilities, and abandoned vehicles or fly-tipping within park boundaries.</p><p>For issues that pose an immediate risk to public safety — such as a partially fallen tree over a footpath — please call our parks emergency line so we can respond immediately.</p><h2>What happens after you report</h2><p>Reports are reviewed each working day. We aim to make an initial assessment within two working days and will prioritise safety-related issues. You will receive a reference number by email, and we will update you when the issue has been resolved.</p><h2>Litter and dog fouling</h2><p>General litter and dog fouling can be reported using the same form. Bins are emptied on a regular schedule — if a bin is overflowing, report it and a crew will attend. Dog fouling is taken seriously and fixed-penalty notices may be issued to anyone observed allowing their dog to foul without clearing up.</p>'
      format: content_format
  field_description:
    -
      value: 'Let us know about damaged play equipment, graffiti, fallen trees, unsafe paths, or other maintenance issues in any of our parks.'
