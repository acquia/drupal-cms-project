  field_content:
    -
      value: '<h2>Single person discount</h2><p>If you are the only adult living in your home, you qualify for a 25% reduction on your bill. Apply online and the discount will be applied to your account within five working days.</p><h2>Full-time students</h2><p>Full-time students are disregarded for local property tax purposes. If all adults in a property are full-time students, the property is fully exempt. If one or more adults is not a student, the student residents are disregarded and the remaining adults pay accordingly. You will need to provide a certificate of enrolment from your institution.</p><h2>Low income support</h2><p>If you are on a low income, you may qualify for a significant reduction through the local tax support scheme. The amount of support depends on your income, savings, and household circumstances. Apply online — decisions are usually made within ten working days.</p><h2>Other disregards</h2><p>Certain people are not counted when calculating how many adults live in a property. This includes people with severe mental impairments, live-in carers who are not the partner of the person they care for, and apprentices on qualifying programmes. Contact us if you think someone in your household may qualify as a disregarded person.</p>'
      format: content_format
  field_description:
    -
      value: 'You may qualify for a reduced bill if you live alone, are a full-time student, or have a low income. Find out what is available and how to apply.'
