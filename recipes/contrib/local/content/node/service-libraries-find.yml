  field_content:
    -
      value: "<h2>Library branches</h2><p>We have seven library branches across the area, ranging from the main Central Library to smaller community branches. All libraries offer free membership, book lending, internet access, and printing. Some branches offer additional services — see the table below.</p><table><thead><tr><th>Library</th><th>Area</th><th>Opening hours</th><th>Notable facilities</th></tr></thead><tbody><tr><td>Central Library</td><td>Town centre</td><td>Mon–Sat 9am–7pm, Sun 11am–4pm</td><td>Study rooms, café, local history archive, 3D printer</td></tr><tr><td>Northgate Branch</td><td>North</td><td>Mon, Wed, Fri 10am–6pm, Sat 10am–2pm</td><td>Children's corner, reading garden</td></tr><tr><td>Eastfield Branch</td><td>East</td><td>Tue, Thu 10am–6pm, Sat 10am–2pm</td><td>Community meeting room (free hire)</td></tr><tr><td>Westbrook Branch</td><td>West</td><td>Mon–Fri 9am–5pm</td><td>Job club, digital skills sessions</td></tr><tr><td>Millside Branch</td><td>South</td><td>Mon, Wed, Sat 10am–4pm</td><td>Children's storytime, toy library</td></tr><tr><td>Harbour Road Branch</td><td>Coastal</td><td>Tue, Thu, Sat 10am–4pm</td><td>Large print and audiobook collection</td></tr><tr><td>Greenfield Mobile Library</td><td>Rural</td><td>Fortnightly — see schedule</td><td>Serves villages without a fixed branch</td></tr></tbody></table><h2>Joining the library</h2><p>Membership is free for everyone. Join in person at any branch with proof of your address, or register online and collect your card from your chosen branch. Children under 16 can join with a parent or guardian's signature. Your library card also gives you access to our full e-book, e-audiobook, and digital magazine catalogue.</p>"
      format: content_format
  field_description:
    -
      value: 'Find your nearest library branch, check opening times, and see what facilities are available at each site.'
