  field_content:
    -
      value: '<h2>What you can borrow</h2><p>Library members can borrow up to twelve physical items at a time, including books, large print editions, audiobooks on CD, DVDs, and music CDs. You can also borrow e-books and e-audiobooks through our digital lending platform, available on any device with no waiting at the branch.</p><h2>Loan periods and renewals</h2><p>Standard loans are for three weeks. You can renew items up to three times online, by phone, or in person — as long as no one else has reserved the item. If you need an item for longer, speak to library staff about your options.</p><blockquote><p>E-books are returned automatically at the end of the loan period — no action needed from you. Physical items can be returned to any of our seven branches, not just the one you borrowed from.</p></blockquote><h2>Reserving items</h2><p>If an item is on loan, you can place a reservation online or at any branch. You will be notified by email or text when it is ready for collection at your chosen branch. A small reservation fee applies for some items borrowed from other library services.</p>'
      format: content_format
  field_description:
    -
      value: 'Borrow books, e-books, audiobooks, DVDs, and more using your free library card. Reserve items online for collection at your chosen branch.'
