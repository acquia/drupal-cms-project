  field_content:
    -
      value: '<h2>Children and families</h2><p>Baby Rhyme Time runs weekly at Central Library and Millside Branch — a free, drop-in session of songs, rhymes, and stories for babies and toddlers. The Summer Reading Challenge takes place every year and encourages children aged 4 to 11 to read six books over the summer holidays. Certificates and small prizes are awarded on completion.</p><h2>Adults and older residents</h2><p>Free digital skills sessions are held at Westbrook Branch every Tuesday morning and are suitable for complete beginners. Subjects include using a smartphone, staying safe online, video calling family, and online banking. No booking is needed — just drop in.</p><p>The Silver Readers book club meets on the first Wednesday of each month at Central Library and is open to all adults. A different book is discussed each month — copies are available to borrow from the library in advance.</p><h2>Learning support</h2><p>Library staff can help you access a range of adult learning resources, including free online courses in numeracy, literacy, and English for speakers of other languages. Ask at any branch for details of what is available in your area.</p>'
      format: content_format
  field_description:
    -
      value: "Our libraries run free programmes for all ages — from baby rhyme time and children's reading clubs to digital skills workshops and adult learning sessions."
