  field_content:
    -
      value: '<h2>Ways to pay</h2><p>Most residents pay by monthly direct debit, which spreads the cost across the year and ensures you never miss a payment. You can also pay online by card at any time, or use one of the other methods listed below.</p><blockquote><p>Setting up a direct debit takes less than five minutes. Payments are collected on either the 1st, 8th, 15th, or 28th of each month — choose whichever date suits you best.</p></blockquote><h2>Payment methods</h2><table><thead><tr><th>Method</th><th>When payment clears</th><th>Charges</th></tr></thead><tbody><tr><td>Direct debit</td><td>Same day</td><td>Free</td></tr><tr><td>Online by debit card</td><td>Same day</td><td>Free</td></tr><tr><td>Online by credit card</td><td>Same day</td><td>Free</td></tr><tr><td>Phone</td><td>Same day</td><td>Free</td></tr><tr><td>Post office or paypoint</td><td>3 working days</td><td>Free</td></tr></tbody></table><h2>If you are struggling to pay</h2><p>Contact us as soon as you think you may have difficulty meeting a payment. We can review your account, check whether you qualify for a <a href="/local-tax/reductions-and-discounts">reduction or discount</a>, and agree a payment arrangement where appropriate. It is always better to contact us early — enforcement action is a last resort and we will do everything we can to help first.</p>'
      format: content_format
  field_description:
    -
      value: 'Pay your local property tax bill online, set up a direct debit, or find other ways to pay.'
