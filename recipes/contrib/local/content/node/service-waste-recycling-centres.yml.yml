  field_content:
    -
      value: '<h2>Household recycling centres</h2><p>Recycling centres accept a wide range of materials that cannot go in your kerbside bins, including electrical items, textiles, paint, batteries, and scrap metal. Centres are open seven days a week and are free to use for residents.</p><p>You may be asked to show proof of address when you arrive. Commercial vehicles and vans require a permit — apply online before your visit.</p><h2>What you can recycle at the kerbside</h2><p>Your blue recycling bin or bag accepts paper and card, glass bottles and jars, plastic bottles, tubs and trays, food tins, drink cans, and foil. Please rinse items before placing them in the bin. Do not bag your recycling — loose items only.</p><p>Items that cannot go in your kerbside recycling include black plastic, polystyrene, food pouches, and anything containing food residue. These should go in your general waste bin or be taken to a recycling centre where appropriate drop-off points are available.</p>'
      format: content_format
  field_description:
    -
      value: 'Find your nearest household recycling centre and check which materials are accepted at the kerbside and which need to be dropped off.'
