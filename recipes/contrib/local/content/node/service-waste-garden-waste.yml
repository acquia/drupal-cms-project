  field_content:
    -
      value: '<h2>What the service covers</h2><p>Your garden waste subscription gives you fortnightly collections throughout the growing season. The brown bin accepts grass clippings, leaves, hedge and shrub prunings, weeds, and small branches up to 10cm in diameter. Please do not include soil, pots, food waste, or treated wood.</p><h2>Subscribing and renewing</h2><p>Subscribe online and your bin will be delivered within ten working days. Subscriptions run annually and can be renewed online before your renewal date. If you move house during your subscription period, contact us to transfer it to your new address — subscriptions are not transferable between residents.</p><h2>What to do outside the season</h2><p>During the winter months when the service is paused, garden waste can be taken to any household recycling centre free of charge. Home composting is a great alternative year-round — composting bins are available to purchase at a subsidised rate through the council.</p>'
      format: content_format
  field_description:
    -
      value: 'Subscribe to fortnightly garden waste collections. The service runs through the growing season and accepts grass cuttings, leaves, prunings, and plants.'
