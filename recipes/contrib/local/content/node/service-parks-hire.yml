  field_content:
    -
      value: '<h2>What can be booked</h2><p>Spaces available for hire include open grass areas, the bandstand at Queensbury Gardens, sports pitches at Victoria Recreation Ground, and the Millbrook Country Park visitor centre and grounds. Each space has different capacity limits and conditions of use.</p><h2>How to apply</h2><p>Submit an event enquiry at least eight weeks before your planned date for small events, and at least six months in advance for events expecting more than 500 attendees. Your application should include a description of the event, expected attendance, proposed layout, and details of any structures, catering, or amplified music.</p><p>We will assess your application against our events policy and may require a site meeting, public liability insurance, and a refundable damage deposit before approval is granted.</p><h2>Community and not-for-profit events</h2><p>Community groups, charities, and not-for-profit organisations may be eligible for reduced hire fees. Include details of your organisation when submitting your application and we will confirm whether a reduction applies.</p>'
      format: content_format
  field_description:
    -
      value: 'Book a park space for a community event, sports fixture, or private function. Applications are considered for events of all sizes.'
