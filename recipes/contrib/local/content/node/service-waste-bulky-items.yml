  field_content:
    -
      value: '<h2>What we collect</h2><p>The bulky item service accepts furniture such as sofas, tables, wardrobes, and beds; white goods including fridges, washing machines, and dishwashers; and mattresses of any size. We can collect up to five items per booking.</p><p>Items must be presented at the kerbside or at the boundary of your property by 7am on your booked collection day. We are unable to enter homes or gardens to collect items.</p><h2>Items we do not collect</h2><p>We cannot collect tyres, asbestos, oil, paint, or any hazardous materials through this service. Electrical items covered by the WEEE directive, such as televisions and computers, should be taken to a recycling centre where they can be processed correctly.</p><h2>How to book</h2><p>Use the online booking form to select a date and confirm your address. You will receive a reference number by email. Collections are available within five working days for most areas. A small charge applies — payment is taken online at the time of booking.</p>'
      format: content_format
  field_description:
    -
      value: 'Arrange a collection for large items such as furniture, white goods, and mattresses that cannot go in your regular bins.'
