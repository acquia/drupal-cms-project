  field_content:
    -
      value: '<h2>Our parks and green spaces</h2><p>We manage over thirty parks, nature reserves, and green spaces across the area. All are free to enter and open throughout the year. The table below lists our main sites with key facilities.</p><table><thead><tr><th>Park</th><th>Area</th><th>Key facilities</th><th>Dogs welcome</th></tr></thead><tbody><tr><td>Ashfield Park</td><td>Central</td><td>Café, play area, bowling green, tennis courts</td><td>Yes, on lead in some areas</td></tr><tr><td>Riverside Meadows</td><td>East</td><td>Walking trails, river access, picnic area</td><td>Yes, off lead permitted</td></tr><tr><td>Queensbury Gardens</td><td>North</td><td>Formal gardens, bandstand, sensory garden</td><td>Yes, on lead</td></tr><tr><td>Thornton Common</td><td>West</td><td>Open grassland, pond, nature trail</td><td>Yes, off lead permitted</td></tr><tr><td>Millbrook Country Park</td><td>South</td><td>Visitor centre, café, cycle trails, orienteering</td><td>Yes, designated areas</td></tr><tr><td>Victoria Recreation Ground</td><td>Central</td><td>Sports pitches, athletics track, skate park</td><td>On lead only</td></tr></tbody></table><h2>Accessibility</h2><p>All main parks have accessible paths, toilets, and parking. Some nature reserves and meadow areas have uneven terrain — check individual park pages for detailed accessibility information. Assistance dogs are welcome in all areas.</p>'
      format: content_format
  field_description:
    -
      value: 'Browse our parks and green spaces, check facilities, and plan your visit. All parks are free to enter and open every day.'
