  field_content:
    -
      value: '<h2>Your weekly collections</h2><p>Most households have collections on the same day each week. Enter your address in the online portal to confirm your day and see the next four weeks of your schedule.</p><blockquote><p>Collections begin from 6am. Please have your bins at the kerbside by then — crews cannot return for bins put out after they have passed.</p></blockquote><h2>What is collected and when</h2><table><thead><tr><th>Bin type</th><th>Colour</th><th>Collection frequency</th></tr></thead><tbody><tr><td>General waste</td><td>Grey or black</td><td>Weekly</td></tr><tr><td>Mixed recycling</td><td>Blue</td><td>Fortnightly</td></tr><tr><td>Food waste</td><td>Green caddy</td><td>Weekly</td></tr><tr><td>Garden waste</td><td>Brown</td><td>Fortnightly (subscription)</td></tr></tbody></table><h2>Bank holidays</h2><p>Collections are not made on public holidays. If your scheduled day falls on or after a bank holiday in the same week, your collection will move forward by one day. Check the <a href="/waste-and-recycling/check-your-collection-schedule">online calendar</a> for confirmed dates around all upcoming holidays.</p><h2>If your bin was not collected</h2><p>Wait until the end of your collection day before reporting a miss — crews can run ahead or behind schedule. If your bin has still not been emptied by 5pm, <a href="/waste-and-recycling/report-a-missed-collection">report a missed collection</a>.</p>'
      format: content_format
  field_description:
    -
      value: 'Find out which bins are collected on which day, and what to do on bank holidays when schedules may change.'
