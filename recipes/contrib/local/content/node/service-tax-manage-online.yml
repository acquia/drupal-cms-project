  field_content:
    -
      value: '<h2>What you can do online</h2><p>Your online account lets you view your current bill and payment history, set up or amend a direct debit, switch to paperless billing, update your contact details, and notify us of a change of address. Most changes take effect within one working day.</p><h2>Registering for an online account</h2><p>You will need your account reference number, which is printed on your most recent bill. Create a login using your email address and choose a secure password. Once registered you can also opt in to email reminders before each payment is due.</p><h2>Paperless billing</h2><p>Switching to paperless billing means your annual bill and any revised notices are sent to your email address instead of by post. You can switch back to paper billing at any time from within your account settings.</p>'
      format: content_format
