  field_content:
    -
      value: "<h2>Moving into a property</h2><p>You become liable for local property tax from the date you move in. Let us know your new address, your move-in date, and whether you are an owner or a tenant. We will set up your account and send your first bill within ten working days.</p><h2>Moving out of a property</h2><p>Your liability ends on the date you vacate — not the date your tenancy or mortgage ends. You will need to tell us the date you moved out and your new address so we can close your account and send a final bill or refund.</p><blockquote><p>If you are moving within the same area, we can transfer your account to your new address. You may be eligible for a refund on your current bill if you have paid ahead.</p></blockquote><h2>What you will need</h2><ul><li>Your current account reference number (found on your bill)</li><li>The address you are moving to or from</li><li>Your move date</li><li>Contact details for a forwarding address if moving out</li></ul><h2>Landlords and letting agents</h2><p>If you are a landlord, you can notify us of a change of tenancy using the same form. Please include the outgoing tenant's move-out date and the incoming tenant's details if known. Where a property becomes vacant between tenancies, the owner becomes liable for the tax.</p>"
      format: content_format
  field_description:
    -
      value: 'Let us know when you move in or out of a property so we can update your local tax account and issue a revised bill.'
