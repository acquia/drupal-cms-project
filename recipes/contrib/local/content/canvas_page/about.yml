      slot: section_main_slot
      uuid: d4d5d6d7-e8e9-4f0f-a1a1-b2b2c3c3d4d4
      component_id: sdc.consistent.text
      inputs:
        text_content: '<p>This is a demonstration site template for local government organisations built on <a href="https://www.drupal.org/project/drupal_cms">Drupal CMS</a>. It shows how Drupal CMS — combined with a purpose-built theme and a small set of content types — can deliver a modern, accessible, and maintainable council website.</p><p>The template is designed to be installed quickly and then customised. The content, images, and branding you see here are placeholders — they are intended to demonstrate the structure and capabilities of the template, not to represent a real council.</p><p>This template was built by <a href="https://www.annertech.com">Annertech</a>, a specialist Drupal agency with extensive experience working with local government organisations.</p>'
    -
