      inputs:
        card_heading: 'Service page'
        card_url: /waste-and-recycling/check-your-collection-schedule
        card_text: 'An individual service page with a title, short description, and rich body content. Supports headings, tables, blockquotes, and lists. Linked to its parent landing page.'
    -
      parent_uuid: e5e6e7e8-f9f0-4a1a-b2b2-c3c3d4d4e5e5
      slot: section_main_slot
