      slot: section_header_slot
      uuid: e1e2e3e4-f5f6-4a7a-b8b8-c9c9d0d0e1e1
      component_id: sdc.consistent.heading
      inputs:
        heading_text: 'How it works'
        heading_level: 2
    -
      parent_uuid: d0d1d2d3-e4e5-4f6f-a7a7-b8b8c9c9d0d0
      slot: section_main_slot
      uuid: f7594ae7-5654-424e-b82d-9e9226fcb1fb
      component_id: sdc.consistent.text
      inputs:
        text_content: "<p><strong>Canvas</strong> is the page builder included with Drupal CMS. It allows editors to compose pages from a library of components without writing any code. The home page, this page, and the What's on page are all built with Canvas. The service landing pages and service pages use standard Drupal node rendering with a custom theme.</p><p><strong>ECA (Event-Condition-Action)</strong> is used to automate the relationship between service pages and their parent landing pages. When a service page is published, ECA automatically creates a summary card on the relevant landing page. When the service page is updated, ECA keeps the card in sync. This means editors only need to manage one piece of content — the service page itself.</p><p><strong>Pathauto</strong> generates clean URLs automatically based on the content title and parent section, so editors do not need to set paths manually.</p>"
