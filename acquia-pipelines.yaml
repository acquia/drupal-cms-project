# =============================================================================
# Acquia Pipelines CI/CD Configuration for Drupal CMS
# =============================================================================
#
# OVERVIEW:
#   This pipeline handles the full CI/CD workflow for a Drupal CMS application:
#     1. Validate & test code quality (PHPCS, PHPUnit, security audit)
#     2. Build a production-ready artifact (composer install --no-dev)
#     3. Deploy to Dev  → on push to 'develop' branch
#     4. Deploy to Stage → on push to 'stage' branch (manual approval)
#     5. Deploy to Prod  → on Git tag (e.g. v1.0.0), requires manual trigger
#
# BRANCH → ENVIRONMENT MAPPING:
#   develop   → Dev  environment  (auto-deploy)
#   stage     → Stage environment (auto-deploy after tests pass)
#   main/tags → Prod environment  (manual approval gate)
#
# ACQUIA ARTIFACT MODEL:
#   Acquia does NOT run `composer install` on deploy. This pipeline builds
#   a full artifact (with vendor/) and pushes it to a "-build" branch.
#   Example: develop → develop-build (deployed to Dev)
#
# PREREQUISITES (set these as Pipeline variables in the Acquia UI):
#   ACQUIA_APP_UUID      - Your Acquia application UUID
#   ACQUIA_DEV_ENV_UUID  - Dev environment UUID
#   ACQUIA_STAGE_ENV_UUID - Stage environment UUID
#   ACQUIA_PROD_ENV_UUID - Prod environment UUID
#   SITE_NAME            - Your Acquia site/subscription name
# =============================================================================

version: 1.3.0

# ---------------------------------------------------------------------------
# Global Variables
# ---------------------------------------------------------------------------
variables:
 global:
   # Increase Composer memory to avoid out-of-memory failures
   COMPOSER_MEMORY_LIMIT: "-1"

   # PHP version used in the pipeline environment
   PHP_VERSION: "8.3"

   # Docroot path for your Drupal installation
   DRUPAL_DOCROOT: "docroot"

   # Custom modules/themes directories scanned by PHPCS
   PHPCS_DIRS: "docroot/modules/custom docroot/themes/custom"

# ---------------------------------------------------------------------------
# Events: Which Git actions trigger the pipeline
# ---------------------------------------------------------------------------
events:
 # Trigger on push to key branches
 push:
   branches:
     include:
       - develop       # Auto-deploy to Dev
       - stage         # Auto-deploy to Stage
       - main          # Builds artifact (no auto-prod deploy — use tags)
       - dist          # Trials branch 
       - "feature/*"   # Run tests on feature branches (no deploy)
       - "hotfix/*"    # Run tests on hotfix branches (no deploy)

 # Trigger on version tags — used for Production deployments
 tag:
   include:
     - "/^v[0-9]+\\.[0-9]+\\.[0-9]+.*/"   # e.g. v1.0.0, v2.1.3-rc1

# ---------------------------------------------------------------------------
# Pipeline Jobs
# ---------------------------------------------------------------------------
jobs:

 # =========================================================================
 # JOB 1: Validate — Code quality, standards, and security checks
 # Runs on ALL branches and tags before any deployment.
 # =========================================================================
 validate:
   type: build
   steps:

     - setup:
         type: script
         script:
           - echo "=== Pipeline: Validate Job ==="
           - echo "Branch/Tag: $ACQUIA_PIPELINE_BRANCH"
           - php --version
           - composer --version

     # Install ALL dependencies (including dev) for linting & testing
     - composer-install:
         type: script
         script:
           - composer validate --strict
           - composer install --no-interaction --prefer-dist --ansi

     # PHP CodeSniffer — Drupal coding standards
     # Fails the pipeline if custom code violates Drupal standards
     - phpcs:
         type: script
         script:
           - echo "--- Running PHP CodeSniffer ---"
           - |
            if [ -d "docroot/modules/custom" ] || [ -d "docroot/themes/custom" ]; then
              ./vendor/bin/phpcs \
                --standard=Drupal,DrupalPractice \
                --extensions=php,module,inc,install,test,profile,theme,yml \
                --ignore=*.min.js,*.min.css \
                $PHPCS_DIRS
            else
              echo "No custom code directories found — skipping PHPCS."
            fi

     # PHP Mess Detector — detect overly complex or buggy code patterns
     - phpmd:
         type: script
         script:
           - echo "--- Running PHP Mess Detector ---"
           - |
            if [ -d "docroot/modules/custom" ]; then
              ./vendor/bin/phpmd docroot/modules/custom text \
                cleancode,codesize,controversial,design,naming,unusedcode \
                --exclude "*.inc" 2>/dev/null || echo "PHPMD: review findings above."
            else
              echo "No custom modules found — skipping PHPMD."
            fi

     # Composer security audit — checks for known CVEs in dependencies
     - security-audit:
         type: script
         script:
           - echo "--- Running Composer Security Audit ---"
           - composer audit --no-dev

 # =========================================================================
 # JOB 2: Unit Tests — PHPUnit tests for custom Drupal modules
 # Runs after validate; only executes if tests exist.
 # =========================================================================
 unit-tests:
   type: build
   steps:

     - composer-install:
         type: script
         script:
           - composer install --no-interaction --prefer-dist --ansi

     - phpunit:
         type: script
         script:
           - echo "=== Pipeline: Unit Tests Job ==="
           - |
            if [ -f "docroot/core/phpunit.xml.dist" ] && [ -d "docroot/modules/custom" ]; then
              echo "--- Running PHPUnit (Unit Suite) ---"
              ./vendor/bin/phpunit \
                --configuration docroot/core/phpunit.xml.dist \
                --testsuite=unit \
                docroot/modules/custom \
                --log-junit=test-results/phpunit-unit.xml \
                --colors=never
            else
              echo "No PHPUnit config or custom modules found — skipping tests."
            fi

 # =========================================================================
 # JOB 3: Build Artifact — Production-ready build (no dev dependencies)
 # This job creates the deployable artifact that Acquia will serve.
 # Only runs on deployable branches (develop, stage, main) and tags.
 # =========================================================================
 build-artifact:
   type: build
   steps:

     - build:
         type: script
         script:
           - echo "=== Pipeline: Build Artifact Job ==="

           # Install production-only Composer dependencies
           - composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --ansi

           # --- Optional: Compile frontend theme assets ---
           # Uncomment and adjust path if you have a custom theme with npm build
           # - |
           #   THEME_DIR="docroot/themes/custom/MY_THEME"
           #   if [ -f "$THEME_DIR/package.json" ]; then
           #     echo "--- Building theme assets ---"
           #     cd $THEME_DIR
           #     npm ci --silent
           #     npm run build
           #     rm -rf node_modules   # Remove node_modules from artifact
           #     cd -
           #   fi

           # Remove development-only files from the artifact
           - rm -rf tests/ docs/ .git/ *.md CHANGELOG.* phpunit.xml* .phpcs.xml*

           - echo "Artifact build complete."

 # =========================================================================
 # JOB 4: Deploy to Dev
 # Triggered automatically when code is pushed to the 'develop' branch.
 # Uses `acli push:artifact` to build and push the "-build" artifact branch.
 # =========================================================================
 deploy-dev:
   type: build
   steps:

     - deploy:
         type: script
         script:
           - echo "=== Pipeline: Deploy to Dev ==="
           - |
            # Only deploy when on the 'develop' branch
            if [ "$ACQUIA_PIPELINE_BRANCH" = "develop" ]; then
              echo "--- Building & pushing artifact to develop-build ---"

              # Push artifact to Acquia Git (develop-build branch)
              acli push:artifact \
                --destination-git-branch="develop-build" \
                --no-interaction \
                --ansi

              echo "--- Switching Dev environment to develop-build ---"
              acli api:environments:code-switch \
                "$ACQUIA_DEV_ENV_UUID" \
                "develop-build" \
                --no-interaction

              echo "Dev deployment triggered. Cloud Hooks will run drush updb + cim + cr."
            else
              echo "Not on 'develop' branch — skipping Dev deploy."
            fi

 # =========================================================================
 # JOB 5: Deploy to Stage
 # Triggered automatically when code is pushed to the 'stage' branch.
 # Stage deployments run after tests pass.
 # =========================================================================
 deploy-stage:
   type: build
   steps:

     - deploy:
         type: script
         script:
           - echo "=== Pipeline: Deploy to Stage ==="
           - |
            if [ "$ACQUIA_PIPELINE_BRANCH" = "stage" ]; then
              echo "--- Building & pushing artifact to stage-build ---"

              acli push:artifact \
                --destination-git-branch="stage-build" \
                --no-interaction \
                --ansi

              echo "--- Switching Stage environment to stage-build ---"
              acli api:environments:code-switch \
                "$ACQUIA_STAGE_ENV_UUID" \
                "stage-build" \
                --no-interaction

              echo "Stage deployment triggered."
            else
              echo "Not on 'stage' branch — skipping Stage deploy."
            fi

 # =========================================================================
 # JOB 6: Deploy to Production
 # ONLY triggered by version tags (e.g. v1.2.0) pushed to the repository.
 # Production deploy requires a tag — this is an intentional safety gate.
 #
 # HOW TO DEPLOY TO PROD:
 #   git tag -a v1.2.0 -m "Release v1.2.0"
 #   git push origin v1.2.0
 # =========================================================================
 deploy-prod:
   type: build
   steps:

     - deploy:
         type: script
         script:
           - echo "=== Pipeline: Deploy to Production ==="
           - |
            # Tags are stored in ACQUIA_PIPELINE_BRANCH for tagged builds
            TAG="$ACQUIA_PIPELINE_BRANCH"

            if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "--- Deploying tag $TAG to Production ---"

              # Push artifact to a prod-specific build branch
              acli push:artifact \
                --destination-git-branch="main-build" \
                --no-interaction \
                --ansi

              echo "--- Switching Production environment to main-build ---"
              acli api:environments:code-switch \
                "$ACQUIA_PROD_ENV_UUID" \
                "main-build" \
                --no-interaction

              echo "Production deployment triggered for tag: $TAG"
              echo "Cloud Hooks will run: maintenance mode on → updb → cim → cr → maintenance off"
            else
              echo "Not a version tag — skipping Production deploy."
            fi

