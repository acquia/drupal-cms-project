# =============================================================================
# Acquia Pipelines CI/CD Configuration for Drupal CMS
# =============================================================================
#
# OVERVIEW:
#   This pipeline handles the full CI/CD workflow for a Drupal CMS application:
#     1. Validate & test code quality (PHPCS, PHPUnit, security audit)
#     2. Build a production-ready artifact (composer install --no-dev)
#     3. Deploy to Dev  → on push to 'develop' branch
#     4. Deploy to Stage → on push to 'stage' branch (manual approval)
#     5. Deploy to Prod  → on Git tag (e.g. v1.0.0), requires manual trigger
#
# BRANCH → ENVIRONMENT MAPPING:
#   develop   → Dev  environment  (auto-deploy)
#   stage     → Stage environment (auto-deploy after tests pass)
#   main/tags → Prod environment  (manual approval gate)
#
# ACQUIA ARTIFACT MODEL:
#   Acquia does NOT run `composer install` on deploy. This pipeline builds
#   a full artifact (with vendor/) and pushes it to a "-build" branch.
#   Example: develop → develop-build (deployed to Dev)
#
# PREREQUISITES (set these as Pipeline variables in the Acquia UI):
#   ACQUIA_APP_UUID      - Your Acquia application UUID
#   ACQUIA_DEV_ENV_UUID  - Dev environment UUID
#   ACQUIA_STAGE_ENV_UUID - Stage environment UUID
#   ACQUIA_PROD_ENV_UUID - Prod environment UUID
#   SITE_NAME            - Your Acquia site/subscription name
# =============================================================================

version: 1.3.0

# ---------------------------------------------------------------------------
# Services: Explicitly set PHP version (required — PHP_VERSION variable alone
# does NOT configure the runtime; the services key is needed for PHP 8.x).
# ---------------------------------------------------------------------------
services:
  - php:
      version: 8.3
  - composer:
      version: 2

# ---------------------------------------------------------------------------
# Global Variables
# ---------------------------------------------------------------------------
variables:
 global:
   # Increase Composer memory to avoid out-of-memory failures
   COMPOSER_MEMORY_LIMIT: "-1"

   # PHP version used in the pipeline environment
   PHP_VERSION: "8.3"

   # Docroot path for your Drupal installation
   DRUPAL_DOCROOT: "docroot"

   # Custom modules/themes directories scanned by PHPCS
   PHPCS_DIRS: "docroot/modules/custom docroot/themes/custom"

# ---------------------------------------------------------------------------
# Events: The 'build' event is the only valid event in Acquia Pipelines.
# All steps run sequentially on every pipeline trigger.
# Branch/tag-specific logic is handled inside scripts via $ACQUIA_PIPELINE_BRANCH.
# ---------------------------------------------------------------------------
