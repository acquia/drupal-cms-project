version: 1.3.0

services:
  - mysql
  - php:
      version: 8.3
  - memcached

events:
  build:
    steps:
      - setup:
          type: script
          script:
            - echo "=== Pipeline Start ==="
            - echo "Branch/Tag: $ACQUIA_PIPELINE_BRANCH"
            - php --version
            - composer --version
            - composer validate --no-check-all --ansi
            - composer install --no-dev --optimize-autoloader
